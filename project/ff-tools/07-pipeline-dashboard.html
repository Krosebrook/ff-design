<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>FF — Pipeline Dashboard</title><style>*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F0618;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;padding:2rem 1rem}
.w{max-width:820px;margin:0 auto}
.brand{font-size:12px;color:#A855F7;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}
h1{font-size:24px;font-weight:600;margin-bottom:.4rem}
.sub{font-size:14px;color:#94a3b8;margin-bottom:1.75rem}
.card{background:#1A0B2E;border:1px solid rgba(168,85,247,.25);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.ct{font-size:11px;color:#A855F7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:1rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
.field{margin-bottom:.75rem}
label{font-size:12px;color:#94a3b8;display:block;margin-bottom:.4rem}
input,select,textarea{width:100%;background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:6px;color:#f1f5f9;padding:.5rem .75rem;font-size:13px;font-family:system-ui}
input:focus,select:focus{outline:none;border-color:#A855F7}
.btn{padding:.75rem 1.5rem;background:#A855F7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.btn:hover{background:#9333EA}
.btn-ghost{background:transparent;border:1px solid rgba(168,85,247,.4);color:#C99BFF}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.badge-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}
.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.badge-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.badge-purple{background:rgba(168,85,247,.2);color:#C99BFF;border:1px solid rgba(168,85,247,.3)}
.badge-blue{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;padding:.5rem .75rem;border-bottom:1px solid rgba(168,85,247,.15)}
td{padding:.6rem .75rem;border-bottom:1px solid rgba(255,255,255,.05);color:#cbd5e1;vertical-align:top}
tr:hover td{background:rgba(168,85,247,.04)}
.mcard{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:.875rem}
.mlbl{font-size:11px;color:#64748b;margin-bottom:.3rem}
.mval{font-size:22px;font-weight:600}
.msub{font-size:10px;color:#475569;margin-top:.2rem}
.stage{text-align:center;padding:.75rem;border-radius:8px;border:1px solid rgba(168,85,247,.2);cursor:pointer}
.stage.active{border-color:#A855F7;background:rgba(168,85,247,.12)}
.stage-num{font-size:22px;font-weight:700;color:#C99BFF}
.stage-lbl{font-size:11px;color:#64748b;margin-top:.2rem}
.add-form{display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.add-form input,.add-form select{flex:1;min-width:140px}
.pipe-table{width:100%;border-collapse:collapse}
.pipe-table th{text-align:left;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;padding:.5rem .75rem;border-bottom:1px solid rgba(168,85,247,.15)}
.pipe-table td{padding:.625rem .75rem;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;color:#cbd5e1}
.pipe-table tr:hover td{background:rgba(168,85,247,.04)}
.del-btn{background:none;border:none;color:#475569;cursor:pointer;font-size:16px;padding:0 4px}
.del-btn:hover{color:#f87171}
.move-btn{background:none;border:1px solid rgba(168,85,247,.3);color:#C99BFF;cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px}
.move-btn:hover{background:rgba(168,85,247,.15)}

/* ---- FlashFusion elevated layer ---- */
body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(620px 380px at 16% -8%,rgba(168,85,247,.16),transparent 70%),radial-gradient(520px 340px at 94% 2%,rgba(34,211,238,.08),transparent 70%)}
h1{font-family:'Poppins',sans-serif;letter-spacing:-.02em}
.brand{font-family:'JetBrains Mono',monospace;color:#A855F7;font-weight:500}
.ct,.section-label{font-family:'JetBrains Mono',monospace}
.card{border-color:rgba(168,85,247,.18);box-shadow:0 1px 0 rgba(255,255,255,.02) inset}
.btn{background:linear-gradient(135deg,#A855F7,#9333EA);box-shadow:0 4px 16px rgba(168,85,247,.24);transition:filter .15s,box-shadow .15s}
.btn:hover{background:linear-gradient(135deg,#A855F7,#9333EA);filter:brightness(1.09);box-shadow:0 6px 22px rgba(168,85,247,.34)}
.btn-ghost{background:transparent;box-shadow:none}
input:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(168,85,247,.16)}
code{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}
@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}
</style></head><body><div class="w">
<div class="brand">FlashFusion AI Enablement</div>
<h1>Pipeline Dashboard</h1>
<p class="sub">Track prospects from first contact to closed. $222K Y1 target.</p>
<div class="card g4" id="stages"></div>
<div class="card" style="margin-top:-.25rem">
<div class="ct">Add Prospect</div>
<div class="add-form">
<input id="pname" placeholder="Company name">
<input id="pcont" placeholder="Contact name">
<select id="pstage"><option value="0">Lead</option><option value="1">Qualified</option><option value="2">Proposal sent</option><option value="3">Negotiating</option><option value="4">Closed</option></select>
<select id="pprod"><option value="4500">Audit — $4,500</option><option value="5000">Sprint — $5,000</option><option value="24000">Retainer — $2K/mo (12mo)</option><option value="0">TBD</option></select>
<button class="btn" onclick="addProspect()">Add</button>
</div>
<table class="pipe-table"><thead><tr><th>Company</th><th>Contact</th><th>Stage</th><th>Value</th><th>Added</th><th></th></tr></thead>
<tbody id="ptbl"></tbody></table>
<div id="empty" style="text-align:center;padding:2rem;color:#475569;font-size:14px">No prospects yet — add one above</div>
</div>
<div class="card"><div class="ct">Target Tracking</div>
<div class="g3">
<div class="mcard"><div class="mlbl">Y1 Target</div><div class="mval" style="color:#f1f5f9">$222,000</div></div>
<div class="mcard"><div class="mlbl">Pipeline value</div><div class="mval" id="pval" style="color:#C99BFF">$0</div></div>
<div class="mcard"><div class="mlbl">Closed (won)</div><div class="mval" id="pclose" style="color:#34d399">$0</div></div>
</div>
</div>
</div>
<script>
var STAGES=["Lead","Qualified","Proposal sent","Negotiating","Closed won"];
var STAGE_COLORS=["badge-blue","badge-purple","badge-amber","badge-amber","badge-green"];
var prospects=[];
var el=document.getElementById("stages");
STAGES.forEach(function(s,i){
var d=document.createElement("div");d.className="stage";d.id="st"+i;
d.innerHTML='<div class="stage-num" id="sn'+i+'">0</div><div class="stage-lbl">'+s+'</div>';
el.appendChild(d);
});
function addProspect(){
var n=document.getElementById("pname").value.trim();
if(!n) return;
prospects.push({
id:Date.now(),name:n,contact:document.getElementById("pcont").value,
stage:+document.getElementById("pstage").value,
value:+document.getElementById("pprod").value,
date:new Date().toLocaleDateString()
});
document.getElementById("pname").value="";document.getElementById("pcont").value="";
render();
}
function advance(id){
var p=prospects.find(function(x){return x.id===id});
if(p&&p.stage<4){p.stage++;render();}
}
function remove(id){
prospects=prospects.filter(function(x){return x.id!==id});render();
}
function render(){
var counts=[0,0,0,0,0],pipeline=0,closed=0;
prospects.forEach(function(p){
counts[p.stage]++;
if(p.stage<4) pipeline+=p.value;
if(p.stage===4) closed+=p.value;
});
counts.forEach(function(c,i){document.getElementById("sn"+i).textContent=c;});
document.getElementById("pval").textContent="$"+pipeline.toLocaleString();
document.getElementById("pclose").textContent="$"+closed.toLocaleString();
var tbl=document.getElementById("ptbl");tbl.innerHTML="";
document.getElementById("empty").style.display=prospects.length?"none":"block";
prospects.forEach(function(p){
var tr=document.createElement("tr");
tr.innerHTML='<td style="font-weight:500;color:#e2e8f0">'+p.name+'</td><td>'+p.contact+'</td><td><span class="badge '+STAGE_COLORS[p.stage]+'">'+STAGES[p.stage]+'</span></td><td style="color:#C99BFF">'+( p.value?"$"+p.value.toLocaleString():"TBD")+'</td><td style="color:#64748b">'+p.date+'</td><td><button class="move-btn" onclick="advance('+p.id+')" title="Advance stage">→</button> <button class="del-btn" onclick="remove('+p.id+')" title="Remove">×</button></td>';
tbl.appendChild(tr);
});
}
render();
</script></body></html>
