alue=\"0\">Not contacted<\/option><option value=\"1\">Email sent<\/option><option value=\"2\">Follow-up sent<\/option><option value=\"3\">Responded<\/option><option value=\"4\">Meeting scheduled<\/option><option value=\"5\">Disqualified<\/option><\/select>\n<input id=\"pnote\" placeholder=\"Notes (ICP fit, referral source...)\">\n<\/div>\n<button class=\"btn\" style=\"margin-top:.75rem\" onclick=\"addP()\">Add Prospect<\/button>\n<\/div>\n<div id=\"plist\"><\/div>\n<\/div>\n<script>\nvar STAGES=[\"Not contacted\",\"Email sent\",\"Follow-up sent\",\"Responded\",\"Meeting scheduled\",\"Disqualified\"];\nvar DOTS=5;\nvar prospects=[\n{id:1,name:\"Ryan Anderskow\",co:\"[Company TBD]\",role:\"Decision maker\",email:\"Pending site launch\",stage:0,note:\"First outreach pending flashfusion.co live + FreeAssessment confirmed functional\"},\n{id:2,name:\"Mark Hope\",co:\"Large healthcare/pension fund\",role:\"Director of Applications\",email:\"Warm intro — personal network\",stage:3,note:\"Dinner meeting context established. Role must be formalized before formal introduction.\"}\n];\nvar nextId=3;\nfunction addP(){\nvar n=document.getElementById(\"pn\").value.trim();if(!n) return;\nprospects.push({id:nextId++,name:n,co:document.getElementById(\"pc\").value,role:document.getElementById(\"prole\").value,email:document.getElementById(\"pe\").value,stage:+document.getElementById(\"pst\").value,note:document.getElementById(\"pnote\").value});\ndocument.getElementById(\"pn\").value=\"\";document.getElementById(\"pc\").value=\"\";\ndocument.getElementById(\"pe\").value=\"\";document.getElementById(\"prole\").value=\"\";\ndocument.getElementById(\"pnote\").value=\"\";\nrender();\n}\nfunction advance(id){\nvar p=prospects.find(function(x){return x.id===id});\nif(p&&p.stage<5){p.stage++;render();}\n}\nfunction remove(id){prospects=prospects.filter(function(x){return x.id!==id});render();}\nfunction render(){\nvar tot=prospects.length,act=prospects.filter(function(p){return p.stage>0&&p.stage<5}).length;\nvar resp=prospects.filter(function(p){return p.stage>=3&&p.stage<5}).length;\ndocument.getElementById(\"tot\").textContent=tot;\ndocument.getElementById(\"act\").textContent=act;\ndocument.getElementById(\"resp\").textContent=resp;\nvar el=document.getElementById(\"plist\");el.innerHTML=\"\";\nprospects.forEach(function(p){\nvar dots=\"\";\nfor(var i=0;i<DOTS;i++) dots+='<div class=\"dot'+(i<p.stage?\" done\":i===p.stage?\" current\":\"\")+'\"><\/div>';\nvar sc=p.stage===5?\"badge-red\":p.stage>=3?\"badge-green\":p.stage>0?\"badge-amber\":\"badge-purple\";\nvar d=document.createElement(\"div\");d.className=\"ot-card\";\nd.innerHTML='<div class=\"ot-header\"><div><div class=\"ot-name\">'+p.name+'<\/div><div class=\"ot-co\">'+p.co+(p.role?\" · \"+p.role:\"\")+'<\/div><\/div><div class=\"ot-actions\"><span class=\"badge '+sc+'\">'+STAGES[p.stage]+'<\/span><button class=\"btn\" style=\"padding:4px 10px;font-size:12px\" onclick=\"advance('+p.id+')\" title=\"Advance\">Next →<\/button><button style=\"background:none;border:none;color:#475569;cursor:pointer;font-size:16px\" onclick=\"remove('+p.id+')\">×<\/button><\/div><\/div><div class=\"stage-dots\">'+dots+'<\/div>'+(p.note?'<div class=\"ot-notes\">'+p.note+'<\/div>':'');\nel.appendChild(d);\n});\n}\nrender();\n<\/script><\/body><\/html>","10-battle-card-browser.html":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<title>FF — Battle Card Browser<\/title><style>*{box-sizing:border-box;margin:0;padding:0}\nbody{background:#0F0618;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;padding:2rem 1rem}\n.w{max-width:820px;margin:0 auto}\n.brand{font-size:12px;color:#A855F7;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}\nh1{font-size:24px;font-weight:600;margin-bottom:.4rem}\n.sub{font-size:14px;color:#94a3b8;margin-bottom:1.75rem}\n.card{background:#1A0B2E;border:1px solid rgba(168,85,247,.25);border-radius:12px;padding:1.5rem;margin-bottom:1rem}\n.ct{font-size:11px;color:#A855F7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:1rem}\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}\n.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}\n.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}\n.field{margin-bottom:.75rem}\nlabel{font-size:12px;color:#94a3b8;display:block;margin-bottom:.4rem}\ninput,select,textarea{width:100%;background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:6px;color:#f1f5f9;padding:.5rem .75rem;font-size:13px;font-family:system-ui}\ninput:focus,select:focus{outline:none;border-color:#A855F7}\n.btn{padding:.75rem 1.5rem;background:#A855F7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}\n.btn:hover{background:#9333EA}\n.btn-ghost{background:transparent;border:1px solid rgba(168,85,247,.4);color:#C99BFF}\n.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}\n.badge-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}\n.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}\n.badge-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25)}\n.badge-purple{background:rgba(168,85,247,.2);color:#C99BFF;border:1px solid rgba(168,85,247,.3)}\n.badge-blue{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}\ntable{width:100%;border-collapse:collapse;font-size:13px}\nth{text-align:left;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;padding:.5rem .75rem;border-bottom:1px solid rgba(168,85,247,.15)}\ntd{padding:.6rem .75rem;border-bottom:1px solid rgba(255,255,255,.05);color:#cbd5e1;vertical-align:top}\ntr:hover td{background:rgba(168,85,247,.04)}\n.mcard{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:.875rem}\n.mlbl{font-size:11px;color:#64748b;margin-bottom:.3rem}\n.mval{font-size:22px;font-weight:600}\n.msub{font-size:10px;color:#475569;margin-top:.2rem}\n.comp-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}\n.comp-tab{padding:.5rem 1rem;border-radius:8px;border:1px solid rgba(168,85,247,.25);background:transparent;color:#94a3b8;cursor:pointer;font-size:13px;font-family:system-ui}\n.comp-tab.on{border-color:#A855F7;background:rgba(168,85,247,.15);color:#C99BFF;font-weight:500}\n.bc-section{margin-bottom:1.5rem}\n.bc-title{font-size:12px;color:#A855F7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:.75rem}\n.bc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}\n.bc-item{background:#0A0414;border:1px solid rgba(168,85,247,.15);border-radius:8px;padding:.875rem}\n.bc-label{font-size:11px;color:#64748b;margin-bottom:.3rem}\n.bc-val{font-size:13px;color:#e2e8f0;line-height:1.5}\n.win{border-left:3px solid #34d399}\n.loss{border-left:3px solid #f87171}\n.neutral{border-left:3px solid #A855F7}\n.objection{background:#1A0B2E;border-radius:8px;padding:1rem;margin-bottom:.75rem}\n.obj-q{font-size:13px;color:#fbbf24;margin-bottom:.5rem}\n.obj-a{font-size:13px;color:#cbd5e1;line-height:1.5}\n\n/* ---- FlashFusion elevated layer ---- */\nbody{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}\nbody::before{content:\"\";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(620px 380px at 16% -8%,rgba(168,85,247,.16),transparent 70%),radial-gradient(520px 340px at 94% 2%,rgba(34,211,238,.08),transparent 70%)}\nh1{font-family:'Poppins',sans-serif;letter-spacing:-.02em}\n.brand{font-family:'JetBrains Mono',monospace;color:#A855F7;font-weight:500}\n.ct,.section-label{font-family:'JetBrains Mono',monospace}\n.card{border-color:rgba(168,85,247,.18);box-shadow:0 1px 0 rgba(255,255,255,.02) inset}\n.btn{background:linear-gradient(135deg,#A855F7,#9333EA);box-shadow:0 4px 16px rgba(168,85,247,.24);transition:filter .15s,box-shadow .15s}\n.btn:hover{background:linear-gradient(135deg,#A855F7,#9333EA);filter:brightness(1.09);box-shadow:0 6px 22px rgba(168,85,247,.34)}\n.btn-ghost{background:transparent;box-shadow:none}\ninput:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(168,85,247,.16)}\ncode{font-family:'JetBrains Mono',monospace}\n::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}\n@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}\n<\/style><\/head><body><div class=\"w\">\n<div class=\"brand\">FlashFusion AI Enablement<\/div>\n<h1>Battle Card Browser<\/h1>\n<p class=\"sub\">Live competitive intelligence for sales calls.<\/p>\n<div class=\"comp-tabs\" id=\"tabs\"><\/div>\n<div id=\"bc-content\"><\/div>\n<\/div>\n<script>\nvar COMPS=[\n{id:\"copilot\",name:\"Microsoft Copilot\",\npos:\"Productivity-first, locked to Microsoft stack, no native compliance layer.\",\ntheir_pitch:\"AI integrated with M365. Your team already uses Teams and Outlook.\",\nour_counter:\"Copilot doesn't have a Trust layer. No audit trail. No auto-generated compliance artifacts. When your auditor asks what your AI agents did last quarter, Copilot has no answer.\",\nwins:[\n{lbl:\"Compliance requirement\",val:\"We generate audit artifacts automatically. Copilot requires manual documentation sprints.\"},\n{lbl:\"Stack flexibility\",val:\"FlashFusion is platform-agnostic. We work with your existing tools, not Microsoft's.\"},\n{lbl:\"Audit trail\",val:\"Every agent action is logged with timestamp and actor. Copilot has no equivalent.\"},\n],\nlosses:[\n{lbl:\"M365 native integration\",val:\"If they're 100% Microsoft and have no compliance obligations, Copilot may be sufficient.\"},\n{lbl:\"Price per seat\",val:\"Copilot is bundled into E3/E5. Appears 'free' even if ROI isn't there.\"},\n],\nobjs:[\n{q:\"We already have Copilot.\",a:\"Copilot is a productivity tool. FlashFusion is a governance and enablement layer. They solve different problems. Ask your auditor how they'd document your Copilot agent actions.\"},\n{q:\"Copilot is cheaper.\",a:\"Copilot appears free because it's bundled. But when you factor in manual compliance documentation time — 40-80 hours per audit cycle at your team's rates — FlashFusion is cheaper.\"}\n]\n},\n{id:\"langchain\",name:\"LangChain / DIY\",\npos:\"Powerful but requires significant engineering effort. No compliance layer.\",\ntheir_pitch:\"Open source, infinitely customizable. We can build exactly what we need.\",\nour_counter:\"LangChain gives you the engine. You have to build the compliance infrastructure yourself — and maintain it. That's an ongoing engineering cost most teams underestimate by 3-5x.\",\nwins:[\n{lbl:\"Time to value\",val:\"FlashFusion deploys in 4-5 weeks. DIY LangChain takes 3-6 months for comparable capability.\"},\n{lbl:\"Compliance layer\",val:\"We ship a Trust layer as a first-class feature. LangChain has nothing built in.\"},\n{lbl:\"Ongoing maintenance\",val:\"We own the platform. You don't pay an engineer to maintain it every time the API changes.\"},\n],\nlosses:[\n{lbl:\"Full customization\",val:\"If they need truly custom agent logic not covered by our builder, LangChain wins on flexibility.\"},\n{lbl:\"Open source credibility\",val:\"Some engineering teams have strong OSS bias. Hard to overcome without a technical champion.\"},\n],\nobjs:[\n{q:\"We can build this ourselves.\",a:\"You can. Most teams that try spend 3-6 months getting to parity, then 20% of an engineer's ongoing time maintaining it. What's the opportunity cost of that engineering capacity?\"},\n{q:\"LangChain is more flexible.\",a:\"True. What specific workflow requires LangChain-level customization? In most cases, FlashFusion's builder covers it — and ships in weeks, not months.\"}\n]\n},\n{id:\"nothing\",name:\"Doing Nothing\",\npos:\"Status quo. No AI tooling in production, or ad-hoc usage with no governance.\",\ntheir_pitch:\"We're not ready. We'll evaluate AI later when it's more mature.\",\nour_counter:\"Every month of delay is a month of compounding competitive disadvantage. The teams moving fast now are the ones who will have the institutional knowledge when AI becomes table stakes.\",\nwins:[\n{lbl:\"Regulatory risk\",val:\"Every unaudited AI agent you deploy today is a liability tomorrow. The question isn't if regulators will scrutinize AI — it's when.\"},\n{lbl:\"Competitive lag\",val:\"Your competitors are already deploying. Waiting 6-12 months to start means starting with 6-12 months of disadvantage.\"},\n{lbl:\"Low entry cost\",val:\"An AI Setup Audit is $4,500 and takes one week. The cost of inaction compounds monthly.\"},\n],\nlosses:[\n{lbl:\"Budget cycle timing\",val:\"If there's genuinely no budget until next FY, nothing to do but stay warm and follow up.\"},\n{lbl:\"Org readiness\",val:\"If leadership hasn't bought in at all, a single champion can't move it. Find the blocker.\"},\n],\nobjs:[\n{q:\"We're not ready for AI yet.\",a:\"What would ready look like? In most cases, 'not ready' means 'we haven't scoped it.' An AI Setup Audit is designed for that exact moment — it tells you exactly where you are and what to do first.\"},\n{q:\"We'll wait until it's more stable.\",a:\"The underlying models are already stable enough for production. What's unstable is your team's process for using them. That's exactly what FlashFusion fixes.\"}\n]\n},\n{id:\"openai\",name:\"OpenAI / ChatGPT Enterprise\",\npos:\"Strong model capability, enterprise tier available. Limited workflow integration.\",\ntheir_pitch:\"GPT-4o is the best model. Enterprise tier has SSO and data privacy.\",\nour_counter:\"ChatGPT Enterprise solves data privacy. It doesn't solve workflow integration, skill deployment, or compliance artifact generation. It's a chat interface with guardrails — not an enablement platform.\",\nwins:[\n{lbl:\"Skill deployment\",val:\"FlashFusion deploys configured skill packs to your team. ChatGPT Enterprise requires each user to configure their own custom instructions.\"},\n{lbl:\"Audit trail\",val:\"ChatGPT Enterprise has no agent audit trail. No auto-generated compliance artifacts.\"},\n{lbl:\"Workflow integration\",val:\"We integrate with your existing stack — n8n, Notion, HubSpot, Drive. ChatGPT stays in the chat interface.\"},\n],\nlosses:[\n{lbl:\"Model quality for raw generation\",val:\"If they need the best raw writing or code generation, GPT-4o has an edge for some use cases.\"},\n{lbl:\"Brand recognition\",val:\"OpenAI has better brand recognition with non-technical buyers. FlashFusion is unknown.\"},\n],\nobjs:[\n{q:\"We use ChatGPT Enterprise already.\",a:\"Great. FlashFusion isn't a replacement — it's a deployment and governance layer. You can use Claude models or GPT-4o underneath. We add the skill packs, the audit trail, and the compliance artifacts ChatGPT doesn't have.\"},\n{q:\"GPT-4o is smarter.\",a:\"Model benchmarks matter for generation tasks. For workflow enablement and compliance, model quality is table stakes — the layer above it is where value gets created. That's where FlashFusion lives.\"}\n]\n}\n];\n\nfunction renderComp(c){\nvar wins=c.wins.map(function(w){return '<div class=\"bc-item win\"><div class=\"bc-label\">'+w.lbl+'<\/div><div class=\"bc-val\">'+w.val+'<\/div><\/div>'}).join(\"\");\nvar losses=c.losses.map(function(l){return '<div class=\"bc-item loss\"><div class=\"bc-label\">'+l.lbl+'<\/div><div class=\"bc-val\">'+l.val+'<\/div><\/div>'}).join(\"\");\nvar objs=c.objs.map(function(o){return '<div class=\"objection\"><div class=\"obj-q\">Objection: \"'+o.q+'\"<\/div><div class=\"obj-a\">→ '+o.a+'<\/div><\/div>'}).join(\"\");\nreturn '<div class=\"bc-section\"><div class=\"bc-title\">Their positioning<\/div><div class=\"bc-item neutral\"><div class=\"bc-val\">'+c.their_pitch+'<\/div><\/div><\/div><div class=\"bc-section\"><div class=\"bc-title\">Our counter<\/div><div class=\"bc-item\" style=\"background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3)\"><div class=\"bc-val\" style=\"color:#C99BFF\">'+c.our_counter+'<\/div><\/div><\/div><div class=\"bc-section\"><div class=\"bc-title\">We win when<\/div><div class=\"bc-grid\">'+wins+'<\/div><\/div><div class=\"bc-section\"><div class=\"bc-title\">We lose when<\/div><div class=\"bc-grid\">'+losses+'<\/div><\/div><div class=\"bc-section\"><div class=\"bc-title\">Objections and responses<\/div>'+objs+'<\/div>';\n}\n\nvar active=COMPS[0].id;\nvar tabs=document.getElementById(\"tabs\");\nCOMPS.forEach(function(c){\nvar btn=document.createElement(\"button\");\nbtn.className=\"comp-tab\"+(c.id===active?\" on\":\"\");\nbtn.textContent=c.name;btn.id=\"tab-\"+c.id;\nbtn.onclick=function(){\nactive=c.id;\ndocument.querySelectorAll(\".comp-tab\").forEach(function(t){t.classList.remove(\"on\")});\nbtn.classList.add(\"on\");\ndocument.getElementById(\"bc-content\").innerHTML=renderComp(c);\n};\ntabs.appendChild(btn);\n});\ndocument.getElementById(\"bc-content\").innerHTML=renderComp(COMPS[0]);\n<\/script><\/body><\/html>","11-client-dashboard.html":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<title>FF — Client Dashboard<\/title><style>*{box-sizing:border-box;margin:0;padding:0}\nbody{background:#0F0618;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;padding:2rem 1rem}\n.w{max-width:820px;margin:0 auto}\n.brand{font-size:12px;color:#A855F7;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}\nh1{font-size:24px;font-weight:600;margin-bottom:.4rem}\n.sub{font-size:14px;color:#94a3b8;margin-bottom:1.75rem}\n.card{background:#1A0B2E;border:1px solid rgba(168,85,247,.25);border-radius:12px;padding:1.5rem;margin-bottom:1rem}\n.ct{font-size:11px;color:#A855F7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:1rem}\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}\n.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}\n.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}\n.field{margin-bottom:.75rem}\nlabel{font-size:12px;color:#94a3b8;display:block;margin-bottom:.4rem}\ninput,select,textarea{width:100%;background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:6px;color:#f1f5f9;padding:.5rem .75rem;font-size:13px;font-family:system-ui}\ninput:focus,select:focus{outline:none;border-color:#A855F7}\n.btn{padding:.75rem 1.5rem;background:#A855F7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}\n.btn:hover{background:#9333EA}\n.btn-ghost{background:transparent;border:1px solid rgba(168,85,247,.4);color:#C99BFF}\n.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}\n.badge-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}\n.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}\n.badge-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25)}\n.badge-purple{background:rgba(168,85,247,.2);color:#C99BFF;border:1px solid rgba(168,85,247,.3)}\n.badge-blue{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}\ntable{width:100%;border-collapse:collapse;font-size:13px}\nth{text-align:left;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;padding:.5rem .75rem;border-bottom:1px solid rgba(168,85,247,.15)}\ntd{padding:.6rem .75rem;border-bottom:1px solid rgba(255,255,255,.05);color:#cbd5e1;vertical-align:top}\ntr:hover td{background:rgba(168,85,247,.04)}\n.mcard{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:.875rem}\n.mlbl{font-size:11px;color:#64748b;margin-bottom:.3rem}\n.mval{font-size:22px;font-weight:600}\n.msub{font-size:10px;color:#475569;margin-top:.2rem}\n.client-selector{margin-bottom:1.5rem}\n.del-item{display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.05)}\n.del-item:last-child{border-bottom:none}\n.del-check{accent-color:#A855F7;width:16px;height:16px;cursor:pointer;flex-shrink:0}\n.del-text{font-size:13px;color:#cbd5e1;flex:1}\n.del-text.done{text-decoration:line-through;color:#475569}\n.del-due{font-size:11px;color:#64748b}\n.activity-item{padding:.625rem 0;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:.75rem}\n.activity-item:last-child{border-bottom:none}\n.act-dot{width:8px;height:8px;border-radius:50%;background:#A855F7;flex-shrink:0;margin-top:5px}\n.act-text{font-size:13px;color:#cbd5e1}\n.act-date{font-size:11px;color:#475569;margin-top:.2rem}\n\n/* ---- FlashFusion elevated layer ---- */\nbody{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}\nbody::before{content:\"\";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(620px 380px at 16% -8%,rgba(168,85,247,.16),transparent 70%),radial-gradient(520px 340px at 94% 2%,rgba(34,211,238,.08),transparent 70%)}\nh1{font-family:'Poppins',sans-serif;letter-spacing:-.02em}\n.brand{font-family:'JetBrains Mono',monospace;color:#A855F7;font-weight:500}\n.ct,.section-label{font-family:'JetBrains Mono',monospace}\n.card{border-color:rgba(168,85,247,.18);box-shadow:0 1px 0 rgba(255,255,255,.02) inset}\n.btn{background:linear-gradient(135deg,#A855F7,#9333EA);box-shadow:0 4px 16px rgba(168,85,247,.24);transition:filter .15s,box-shadow .15s}\n.btn:hover{background:linear-gradient(135deg,#A855F7,#9333EA);filter:brightness(1.09);box-shadow:0 6px 22px rgba(168,85,247,.34)}\n.btn-ghost{background:transparent;box-shadow:none}\ninput:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(168,85,247,.16)}\ncode{font-family:'JetBrains Mono',monospace}\n::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}\n@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}\n<\/style><\/head><body><div class=\"w\">\n<div class=\"brand\">FlashFusion AI Enablement<\/div>\n<h1>Client Dashboard<\/h1>\n<p class=\"sub\">Per-client view: sprint status, deliverables, activity log.<\/p>\n<div class=\"card client-selector\">\n<div class=\"ct\">Active Client<\/div>\n<select id=\"client-sel\" onchange=\"switchClient()\" style=\"width:100%;background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:6px;color:#f1f5f9;padding:.5rem .75rem;font-size:14px\">\n<option value=\"butler\">Chris Butler<\/option>\n<option value=\"new\">+ Add client<\/option>\n<\/select>\n<\/div>\n<div id=\"client-view\"><\/div>\n<\/div>\n<script>\nvar CLIENTS={\nbutler:{\nname:\"Chris Butler\",co:\"[Company]\",type:\"Skills Library — 5-skill suite\",start:\"2026-03\",stage:4,\nhealth:100,\ndeliverables:[\n{t:\"Skills needs assessment\",done:true,due:\"Week 1\"},\n{t:\"5 custom skill packs configured\",done:true,due:\"Week 2\"},\n{t:\"Skill deployment to environment\",done:true,due:\"Week 3\"},\n{t:\"Training session (60 min)\",done:true,due:\"Week 4\"},\n{t:\"Skills user guide delivered\",done:true,due:\"Week 4\"},\n],\nactivity:[\n{text:\"5-skill suite complete — all skills deployed\",date:\"Apr 2026\"},\n{text:\"Teams migration agent in progress\",date:\"Apr 2026\"},\n{text:\"Skills needs assessment complete\",date:\"Mar 2026\"},\n]\n}\n};\nvar checks={};\nfunction switchClient(){\nvar v=document.getElementById(\"client-sel\").value;\nif(v===\"new\"){alert(\"Client management: add clients to CLIENTS object in source.\");return;}\nif(CLIENTS[v]) renderClient(CLIENTS[v],v);\n}\nfunction renderClient(c,id){\nif(!checks[id]){\nchecks[id]={};\nc.deliverables.forEach(function(d,i){checks[id][i]=d.done;});\n}\nvar health=c.health;\nvar hcolor=health>=80?\"#34d399\":health>=50?\"#fbbf24\":\"#f87171\";\nvar stageLabels=[\"Not started\",\"Discovery\",\"Delivery\",\"Review\",\"Complete\"];\nvar dels=c.deliverables.map(function(d,i){\nvar done=checks[id][i];\nreturn '<div class=\"del-item\"><input type=\"checkbox\" class=\"del-check\" '+(done?\"checked\":\"\")+\" onchange=\"toggleDel('\"+id+\"',\"+i+\",this.checked)\"><span class='del-text\"+(done?\" done\":\"\")+\"' id='dt-\"+id+\"-\"+i+\"'>\"+d.t+\"<\/span><span class='del-due'>\"+d.due+\"<\/span><\/div>\";\n}).join(\"\");\nvar acts=c.activity.map(function(a){\nreturn '<div class=\"activity-item\"><div class=\"act-dot\"><\/div><div><div class=\"act-text\">'+a.text+'<\/div><div class=\"act-date\">'+a.date+'<\/div><\/div><\/div>';\n}).join(\"\");\ndocument.getElementById(\"client-view\").innerHTML='<div class=\"g3 card\"><div class=\"mcard\"><div class=\"mlbl\">Engagement<\/div><div class=\"mval\" style=\"font-size:14px;color:#f1f5f9\">'+c.type+'<\/div><\/div><div class=\"mcard\"><div class=\"mlbl\">Stage<\/div><div class=\"mval\" style=\"font-size:14px;color:#C99BFF\">'+stageLabels[Math.min(c.stage,4)]+'<\/div><\/div><div class=\"mcard\"><div class=\"mlbl\">Health<\/div><div class=\"mval\" style=\"color:'+hcolor+'\">'+health+'%<\/div><\/div><\/div><div class=\"card\"><div class=\"ct\">Deliverables<\/div>'+dels+'<\/div><div class=\"card\"><div class=\"ct\">Activity Log<\/div>'+acts+'<\/div>';\n}\nfunction toggleDel(cid,idx,val){\nchecks[cid][idx]=val;\nvar el=document.getElementById(\"dt-\"+cid+\"-\"+idx);\nif(el) el.className=\"del-text\"+(val?\" done\":\"\");\n}\nswitchClient();\n<\/script><\/body><\/html>","12-newsletter-generator.html":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<title>FF — Newsletter Generator<\/title><style>*{box-sizing:border-box;margin:0;padding:0}\nbody{background:#0F0618;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;padding:2rem 1rem}\n.w{max-width:820px;margin:0 auto}\n.brand{font-size:12px;color:#A855F7;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}\nh1{font-size:24px;font-weight:600;margin-bottom:.4rem}\n.sub{font-size:14px;color:#94a3b8;margin-bottom:1.75rem}\n.card{background:#1A0B2E;border:1px solid rgba(168,85,247,.25);border-radius:12px;padding:1.5rem;margin-bottom:1rem}\n.ct{font-size:11px;color:#A855F7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:1rem}\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}\n.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}\n.field{margin-bottom:.75rem}\nlabel{font-size:12px;color:#94a3b8;display:block;margin-bottom:.4rem}\ninput,select,textarea{width:100%;background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:6px;color:#f1f5f9;padding:.5rem .75rem;font-size:13px;font-family:system-ui}\ninput:focus,select:focus,textarea:focus{outline:none;border-color:#A855F7}\n.btn{padding:.75rem 1.5rem;background:#A855F7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}\n.btn:hover{background:#9333EA}\n.btn-ghost{background:transparent;border:1px solid rgba(168,85,247,.4);color:#C99BFF}\n.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}\n.badge-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}\n.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}\n.badge-purple{background:rgba(168,85,247,.2);color:#C99BFF;border:1px solid rgba(168,85,247,.3)}\n.mcard{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:.875rem}\n.mlbl{font-size:11px;color:#64748b;margin-bottom:.3rem}\n.mval{font-size:22px;font-weight:600}\n#out{background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:10px;padding:1.5rem;white-space:pre-wrap;font-size:13px;color:#cbd5e1;line-height:1.7;min-height:200px;display:none;margin-top:1rem}\n.loading{color:#C99BFF;font-size:14px;display:none}\n.signal-row{display:flex;gap:.5rem;margin-bottom:.5rem;align-items:center}\n.signal-row input{flex:1}\n.signal-row button{background:none;border:none;color:#475569;cursor:pointer;font-size:18px;flex-shrink:0}\n.signal-row button:hover{color:#f87171}\n\n/* ---- FlashFusion elevated layer ---- */\nbody{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}\nbody::before{content:\"\";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(620px 380px at 16% -8%,rgba(168,85,247,.16),transparent 70%),radial-gradient(520px 340px at 94% 2%,rgba(34,211,238,.08),transparent 70%)}\nh1{font-family:'Poppins',sans-serif;letter-spacing:-.02em}\n.brand{font-family:'JetBrains Mono',monospace;color:#A855F7;font-weight:500}\n.ct,.section-label{font-family:'JetBrains Mono',monospace}\n.card{border-color:rgba(168,85,247,.18);box-shadow:0 1px 0 rgba(255,255,255,.02) inset}\n.btn{background:linear-gradient(135deg,#A855F7,#9333EA);box-shadow:0 4px 16px rgba(168,85,247,.24);transition:filter .15s,box-shadow .15s}\n.btn:hover{background:linear-gradient(135deg,#A855F7,#9333EA);filter:brightness(1.09);box-shadow:0 6px 22px rgba(168,85,247,.34)}\n.btn-ghost{background:transparent;box-shadow:none}\ninput:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(168,85,247,.16)}\ncode{font-family:'JetBrains Mono',monospace}\n::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}\n@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}\n<\/style><\/head><body><div class=\"w\">\n<div class=\"brand\">FlashFusion AI Enablement<\/div>\n<h1>Newsletter Generator<\/h1>\n<p class=\"sub\">The Prompt — weekly AI enablement briefing. Add this week's signals, generate draft.<\/p>\n<div class=\"card\"><div class=\"ct\">Edition Info<\/div>\n<div class=\"g2\">\n<div class=\"field\"><label>Edition number<\/label><input id=\"enum\" placeholder=\"e.g. 12\" type=\"number\"><\/div>\n<div class=\"field\"><label>Week of<\/label><input id=\"edate\" type=\"date\"><\/div>\n<\/div>\n<div class=\"field\"><label>Audience focus this week<\/label>\n<select id=\"focus\">\n<option value=\"all\">All — general AI enablement<\/option>\n<option value=\"compliance\">Compliance-heavy orgs (healthcare, finance)<\/option>\n<option value=\"smb\">SMB teams (sub-100 employees)<\/option>\n<option value=\"technical\">Technical leaders (VPE, architects)<\/option>\n<\/select><\/div>\n<\/div>\n<div class=\"card\"><div class=\"ct\">This Week's Signals (3-7 items)<\/div>\n<div id=\"signals\">\n<div class=\"signal-row\"><input placeholder=\"e.g. Anthropic releases Claude 4 with extended context\" class=\"sig\"><button onclick=\"removeSignal(this)\">×<\/button><\/div>\n<div class=\"signal-row\"><input placeholder=\"e.g. SOC 2 Type 2 now requires AI agent documentation\" class=\"sig\"><button onclick=\"removeSignal(this)\">×<\/button><\/div>\n<div class=\"signal-row\"><input placeholder=\"e.g. Gartner: 40% of enterprises will have AI governance policies by 2026\" class=\"sig\"><button onclick=\"removeSignal(this)\">×<\/button><\/div>\n<\/div>\n<button class=\"btn btn-ghost\" style=\"margin-top:.75rem;padding:.5rem 1rem;font-size:12px\" onclick=\"addSignal()\">+ Add signal<\/button>\n<\/div>\n<div class=\"card\"><div class=\"ct\">Skill or Tool Spotlight<\/div>\n<div class=\"field\"><label>Spotlight this week<\/label><input id=\"spotlight\" placeholder=\"e.g. workflow-automation skill pack — what it does and when to use it\"><\/div>\n<\/div>\n<button class=\"btn\" style=\"width:100%;margin-bottom:.5rem\" onclick=\"generate()\">Generate Newsletter Draft<\/button>\n<div class=\"loading\" id=\"load\">Generating with Claude...<\/div>\n<div id=\"out\"><\/div>\n<button class=\"btn btn-ghost\" id=\"cpbtn\" style=\"width:100%;display:none;margin-top:.75rem\" onclick=\"copyOut()\">Copy Draft<\/button>\n<\/div>\n<script>\nfunction addSignal(){\nvar row=document.createElement(\"div\");row.className=\"signal-row\";\nrow.innerHTML='<input placeholder=\"Add signal...\" class=\"sig\"><button onclick=\"removeSignal(this)\">×<\/button>';\ndocument.getElementById(\"signals\").appendChild(row);\n}\nfunction removeSignal(btn){btn.parentElement.remove()}\nasync function generate(){\nvar sigs=Array.from(document.querySelectorAll(\".sig\")).map(function(i){return i.value.trim()}).filter(Boolean);\nif(sigs.length<2){alert(\"Add at least 2 signals.\");return;}\nvar num=document.getElementById(\"enum\").value||\"[N]\";\nvar date=document.getElementById(\"edate\").value||\"this week\";\nvar focus=document.getElementById(\"focus\").value;\nvar spotlight=document.getElementById(\"spotlight\").value;\nvar prompt=\"You are writing 'The Prompt', a weekly AI enablement newsletter by FlashFusion. Write Edition \"+num+\" for the week of \"+date+\". Audience: \"+focus+\". Voice: direct, no fluff, written like a practitioner for practitioners. No sycophancy. Format: short intro (2 sentences), 3-4 'This Week' bullets from these signals, a skill spotlight section, and a closing CTA to visit audit.flashfusion.co. Signals: \"+sigs.join(\"; \")+\". Spotlight: \"+(spotlight||\"no spotlight this week\")+\". Write the complete newsletter edition, ready to publish. Use plain text, no markdown.\";\ndocument.getElementById(\"load\").style.display=\"block\";\ndocument.getElementById(\"out\").style.display=\"none\";\ndocument.getElementById(\"cpbtn\").style.display=\"none\";\ntry{\nvar resp=await fetch(\"https://api.anthropic.com/v1/messages\",{\nmethod:\"POST\",headers:{\"Content-Type\":\"application/json\"},\nbody:JSON.stringify({model:\"claude-sonnet-4-20250514\",max_tokens:1000,messages:[{role:\"user\",content:prompt}]})\n});\nvar data=await resp.json();\nvar text=data.content&&data.content[0]&&data.content[0].text?\"The Prompt — Edition \"+num+\"\\nWeek of \"+date+\"\\n\\n\"+data.content[0].text:\"[Generation failed — check API]\";\ndocument.getElementById(\"out\").textContent=text;\ndocument.getElementById(\"out\").style.display=\"block\";\ndocument.getElementById(\"cpbtn\").style.display=\"block\";\n}catch(e){document.getElementById(\"out\").textContent=\"API error: \"+e.message;document.getElementById(\"out\").style.display=\"block\";}\ndocument.getElementById(\"load\").style.display=\"none\";\n}\nfunction copyOut(){\nnavigator.clipboard.writeText(document.getElementById(\"out\").textContent).then(function(){\ncpbtn.textContent=\"Copied!\";setTimeout(function(){cpbtn.textContent=\"Copy Draft\"},2000);\n});\n}\ndocument.getElementById(\"edate\").value=new Date().toISOString().split(\"T\")[0];\n<\/script><\/body><\/html>","13-skills-gap-detector.html":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<title>FF — Skills Gap Detector<\/title><style>*{box-sizing:border-box;margin:0;padding:0}\nbody{background:#0F0618;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;padding:2rem 1rem}\n.w{max-width:820px;margin:0 auto}\n.brand{font-size:12px;color:#A855F7;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}\nh1{font-size:24px;font-weight:600;margin-bottom:.4rem}\n.sub{font-size:14px;color:#94a3b8;margin-bottom:1.75rem}\n.card{background:#1A0B2E;border:1px solid rgba(168,85,247,.25);border-radius:12px;padding:1.5rem;margin-bottom:1rem}\n.ct{font-size:11px;color:#A855F7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:1rem}\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}\n.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}\n.field{margin-bottom:.75rem}\nlabel{font-size:12px;color:#94a3b8;display:block;margin-bottom:.4rem}\ninput,select,textarea{width:100%;background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:6px;color:#f1f5f9;padding:.5rem .75rem;font-size:13px;font-family:system-ui}\ninput:focus,select:focus,textarea:focus{outline:none;border-color:#A855F7}\n.btn{padding:.75rem 1.5rem;background:#A855F7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}\n.btn:hover{background:#9333EA}\n.btn-ghost{background:transparent;border:1px solid rgba(168,85,247,.4);color:#C99BFF}\n.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}\n.badge-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}\n.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}\n.badge-purple{background:rgba(168,85,247,.2);color:#C99BFF;border:1px solid rgba(168,85,247,.3)}\n.mcard{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:.875rem}\n.mlbl{font-size:11px;color:#64748b;margin-bottom:.3rem}\n.mval{font-size:22px;font-weight:600}\n.q-block{margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(255,255,255,.06)}\n.q-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}\n.q-text{font-size:15px;font-weight:500;color:#e2e8f0;margin-bottom:.75rem}\n.options{display:flex;flex-direction:column;gap:.4rem}\n.option{display:flex;align-items:center;gap:.75rem;cursor:pointer;padding:.5rem .75rem;border-radius:6px;border:1px solid rgba(168,85,247,.15);background:transparent;transition:all .15s}\n.option:hover{background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.3)}\n.option.sel{background:rgba(168,85,247,.15);border-color:#A855F7}\n.option input{accent-color:#A855F7;flex-shrink:0}\n.option label{font-size:13px;color:#cbd5e1;cursor:pointer;flex:1}\n.rec-card{background:#0A0414;border:1px solid rgba(168,85,247,.35);border-radius:10px;padding:1.25rem;margin-bottom:.75rem}\n.rec-name{font-size:14px;font-weight:600;color:#C99BFF;margin-bottom:.3rem}\n.rec-reason{font-size:13px;color:#94a3b8;margin-bottom:.5rem}\n.rec-priority{font-size:11px;font-weight:600}\n.pri-h{color:#f87171}.pri-m{color:#fbbf24}.pri-l{color:#34d399}\n\n/* ---- FlashFusion elevated layer ---- */\nbody{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}\nbody::before{content:\"\";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(620px 380px at 16% -8%,rgba(168,85,247,.16),transparent 70%),radial-gradient(520px 340px at 94% 2%,rgba(34,211,238,.08),transparent 70%)}\nh1{font-family:'Poppins',sans-serif;letter-spacing:-.02em}\n.brand{font-family:'JetBrains Mono',monospace;color:#A855F7;font-weight:500}\n.ct,.section-label{font-family:'JetBrains Mono',monospace}\n.card{border-color:rgba(168,85,247,.18);box-shadow:0 1px 0 rgba(255,255,255,.02) inset}\n.btn{background:linear-gradient(135deg,#A855F7,#9333EA);box-shadow:0 4px 16px rgba(168,85,247,.24);transition:filter .15s,box-shadow .15s}\n.btn:hover{background:linear-gradient(135deg,#A855F7,#9333EA);filter:brightness(1.09);box-shadow:0 6px 22px rgba(168,85,247,.34)}\n.btn-ghost{background:transparent;box-shadow:none}\ninput:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(168,85,247,.16)}\ncode{font-family:'JetBrains Mono',monospace}\n::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}\n@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}\n<\/style><\/head><body><div class=\"w\">\n<div class=\"brand\">FlashFusion AI Enablement<\/div>\n<h1>Skills Gap Detector<\/h1>\n<p class=\"sub\">Answer 5 questions — get your personalized skill pack recommendation.<\/p>\n<div class=\"card\" id=\"quiz\">\n<div class=\"q-block\">\n<div class=\"q-text\">1. What is your team's primary AI use case?<\/div>\n<div class=\"options\" data-q=\"usecase\">\n<label class=\"option\"><input type=\"radio\" name=\"uc\" value=\"content\"> <label>Writing, content, and communications<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"uc\" value=\"automation\"> <label>Automating repetitive workflows<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"uc\" value=\"analysis\"> <label>Research, analysis, and decision support<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"uc\" value=\"dev\"> <label>Software development and engineering<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"uc\" value=\"sales\"> <label>Sales, outreach, and client work<\/label><\/label>\n<\/div>\n<\/div>\n<div class=\"q-block\">\n<div class=\"q-text\">2. What is your biggest current AI frustration?<\/div>\n<div class=\"options\">\n<label class=\"option\"><input type=\"radio\" name=\"fr\" value=\"inconsistent\"> <label>Output quality is inconsistent<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"fr\" value=\"slow\"> <label>AI tools don't connect to our workflows<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"fr\" value=\"training\"> <label>Team doesn't know how to use AI effectively<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"fr\" value=\"governance\"> <label>No policies or guardrails in place<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"fr\" value=\"roi\"> <label>Can't measure what AI is actually doing for us<\/label><\/label>\n<\/div>\n<\/div>\n<div class=\"q-block\">\n<div class=\"q-text\">3. How large is the team that will use AI tools?<\/div>\n<div class=\"options\">\n<label class=\"option\"><input type=\"radio\" name=\"sz\" value=\"small\"> <label>1-10 people<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"sz\" value=\"mid\"> <label>11-50 people<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"sz\" value=\"large\"> <label>51-200 people<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"sz\" value=\"enterprise\"> <label>200+ people<\/label><\/label>\n<\/div>\n<\/div>\n<div class=\"q-block\">\n<div class=\"q-text\">4. What best describes your compliance situation?<\/div>\n<div class=\"options\">\n<label class=\"option\"><input type=\"radio\" name=\"comp\" value=\"heavy\"> <label>Heavy — SOC 2, HIPAA, or similar requirements<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"comp\" value=\"moderate\"> <label>Moderate — we have internal policies<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"comp\" value=\"light\"> <label>Light — startup, minimal requirements<\/label><\/label>\n<\/div>\n<\/div>\n<div class=\"q-block\">\n<div class=\"q-text\">5. What's your timeline for getting AI workflows in production?<\/div>\n<div class=\"options\">\n<label class=\"option\"><input type=\"radio\" name=\"tl\" value=\"now\"> <label>Now — we have urgency<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"tl\" value=\"quarter\"> <label>This quarter<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"tl\" value=\"year\"> <label>Within the year<\/label><\/label>\n<label class=\"option\"><input type=\"radio\" name=\"tl\" value=\"exploring\"> <label>Just exploring<\/label><\/label>\n<\/div>\n<\/div>\n<button class=\"btn\" style=\"width:100%;margin-top:.5rem\" onclick=\"recommend()\">See My Skill Recommendations<\/button>\n<\/div>\n<div id=\"recs\" style=\"display:none\">\n<div style=\"font-size:16px;font-weight:600;color:#f1f5f9;margin-bottom:1rem\" id=\"rec-title\"><\/div>\n<div id=\"rec-list\"><\/div>\n<div class=\"card\" style=\"text-align:center;margin-top:1rem\">\n<div style=\"font-size:14px;color:#94a3b8;margin-bottom:.75rem\">Get a full AI Setup Audit to see all gaps — not just the top ones.<\/div>\n<button class=\"btn\" onclick=\"window.open('https://audit.flashfusion.co','_blank')\">Free AI Setup Audit<\/button>\n<\/div>\n<\/div>\n<\/div>\n<script>\nvar SKILL_MAP={\ncontent:[\"generating-social-posts\",\"drafting-multi-format-content\",\"producing-ai-newsletter\"],\nautomation:[\"workflow-automation\",\"orchestrating-ai-agents\",\"task-decomposition\"],\nanalysis:[\"applying-adversarial-review\",\"code-auditor\",\"task-decomposition\"],\ndev:[\"code-auditor\",\"applying-sparc-methodology\",\"engineering-staff-workflows\",\"debug-like-expert\"],\nsales:[\"roi-calculator-building\",\"ai-solution-architecture\",\"generating-social-posts\"],\ninconsistent:[\"applying-adversarial-review\",\"developing-skills\"],\nslow:[\"workflow-automation\",\"orchestrating-ai-agents\"],\ntraining:[\"generating-kb-articles\",\"drafting-multi-format-content\"],\ngovernance:[\"applying-adversarial-review\",\"engineering-staff-workflows\"],\nroi:[\"roi-calculator-building\",\"applying-adversarial-review\"],\nheavy:[\"engineering-staff-workflows\",\"applying-adversarial-review\"],\nnow:[\"ai-audit-delivery\",\"enablement-sprint-planning\"],\n};\nvar SKILL_DESC={\n\"generating-social-posts\":\"Produces LinkedIn/X/Threads content in your brand voice — hook A/B/C variants, ready to post.\",\n\"drafting-multi-format-content\":\"48 templates covering scripts, threads, carousels, and customer lifecycle emails.\",\n\"workflow-automation\":\"Connects your SaaS tools via n8n, Zapier, or Make. Multi-step automation without code.\",\n\"orchestrating-ai-agents\":\"Designs and deploys multi-agent systems using MCP, LangChain, or CrewAI.\",\n\"applying-adversarial-review\":\"Every claim labeled sourced or generated. Flags agreement streaks. Anti-hallucination.\",\n\"roi-calculator-building\":\"Builds B2B ROI models with payback period, net value, and executive narrative.\",\n\"ai-solution-architecture\":\"Pre-sales technical architectures for AI/ML. Integration mapping, risk flags.\",\n\"code-auditor\":\"Full codebase analysis: architecture, security, performance, tech debt.\",\n\"applying-sparc-methodology\":\"Structured dev: Spec → Pseudocode → Architecture → Refinement → Completion.\",\n\"engineering-staff-workflows\":\"Security-first staff engineer workflow. WSJF prioritization, threat modeling.\",\n\"debug-like-expert\":\"Systematic root cause analysis with hypothesis testing.\",\n\"generating-kb-articles\":\"Formatted .docx KB articles, SOPs, runbooks, onboarding guides.\",\n\"task-decomposition\":\"Breaks complex multi-part requests into parallel workstreams.\",\n\"producing-ai-newsletter\":\"Research, draft, edit, format, and deliver newsletter editions end-to-end.\",\n\"developing-skills\":\"Creates and manages Claude skill packs per Anthropic March 2026 spec.\",\n\"ai-audit-delivery\":\"Runs FF AI Setup Audits end-to-end — gap analysis, priority matrix, report.\",\n\"enablement-sprint-planning\":\"Plans 5-week enablement sprints with milestones and client delivery checklist.\",\n};\nfunction recommend(){\nvar uc=document.querySelector(\"input[name='uc']:checked\");\nvar fr=document.querySelector(\"input[name='fr']:checked\");\nvar comp=document.querySelector(\"input[name='comp']:checked\");\nvar tl=document.querySelector(\"input[name='tl']:checked\");\nif(!uc||!fr){alert(\"Please answer all questions.\");return;}\nvar picks={};\nvar score=function(skills,pri){skills.forEach(function(s){picks[s]=(picks[s]||0)+pri;});};\nif(SKILL_MAP[uc.value]) score(SKILL_MAP[uc.value],3);\nif(SKILL_MAP[fr.value]) score(SKILL_MAP[fr.value],2);\nif(comp&&comp.value===\"heavy\") score([\"engineering-staff-workflows\",\"applying-adversarial-review\"],2);\nif(tl&&tl.value===\"now\") score([\"ai-audit-delivery\",\"enablement-sprint-planning\"],3);\nvar sorted=Object.entries(picks).sort(function(a,b){return b[1]-a[1]}).slice(0,6);\ndocument.getElementById(\"rec-title\").textContent=\"Top \"+sorted.length+\" recommended skill packs for your team\";\nvar el=document.getElementById(\"rec-list\");el.innerHTML=\"\";\nsorted.forEach(function(pair,i){\nvar s=pair[0],score=pair[1];\nvar pri=score>=5?\"h\":score>=3?\"m\":\"l\";\nvar priLabel=pri===\"h\"?\"High priority\":pri===\"m\"?\"Medium priority\":\"Supporting\";\nvar priClass=\"pri-\"+(pri===\"h\"?\"h\":pri===\"m\"?\"m\":\"l\");\nvar d=document.createElement(\"div\");d.className=\"rec-card\";\nd.innerHTML='<div class=\"rec-name\">'+(i+1)+\". \"+s+'<\/div><div class=\"rec-reason\">'+(SKILL_DESC[s]||\"Production-ready Claude skill pack.\")+'<\/div><div class=\"rec-priority '+priClass+'\">'+priLabel+'<\/div>';\nel.appendChild(d);\n});\ndocument.getElementById(\"quiz\").style.display=\"none\";\ndocument.getElementById(\"recs\").style.display=\"block\";\n}\ndocument.querySelectorAll(\".option\").forEach(function(opt){\nopt.addEventListener(\"click\",function(){\nvar inp=opt.querySelector(\"input\");\nif(inp){\ninp.checked=true;\nvar name=inp.name;\ndocument.querySelectorAll(\"input[name='\"+name+\"']\").forEach(function(r){\nr.closest(\".option\").classList.remove(\"sel\");\n});\nopt.classList.add(\"sel\");\n}\n});\n});\n<\/script><\/body><\/html>","14-onboarding-hub.html":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<title>FF — Client Onboarding Hub<\/title><style>*{box-sizing:border-box;margin:0;padding:0}\nbody{background:#0F0618;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;padding:2rem 1rem}\n.w{max-width:820px;margin:0 auto}\n.brand{font-size:12px;color:#A855F7;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}\nh1{font-size:24px;font-weight:600;margin-bottom:.4rem}\n.sub{font-size:14px;color:#94a3b8;margin-bottom:1.75rem}\n.card{background:#1A0B2E;border:1px solid rgba(168,85,247,.25);border-radius:12px;padding:1.5rem;margin-bottom:1rem}\n.ct{font-size:11px;color:#A855F7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:1rem}\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}\n.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}\n.field{margin-bottom:.75rem}\nlabel{font-size:12px;color:#94a3b8;display:block;margin-bottom:.4rem}\ninput,select,textarea{width:100%;background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:6px;color:#f1f5f9;padding:.5rem .75rem;font-size:13px;font-family:system-ui}\ninput:focus,select:focus,textarea:focus{outline:none;border-color:#A855F7}\n.btn{padding:.75rem 1.5rem;background:#A855F7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}\n.btn:hover{background:#9333EA}\n.btn-ghost{background:transparent;border:1px solid rgba(168,85,247,.4);color:#C99BFF}\n.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}\n.badge-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}\n.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}\n.badge-purple{background:rgba(168,85,247,.2);color:#C99BFF;border:1px solid rgba(168,85,247,.3)}\n.mcard{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:.875rem}\n.mlbl{font-size:11px;color:#64748b;margin-bottom:.3rem}\n.mval{font-size:22px;font-weight:600}\n.step{display:flex;gap:1rem;align-items:flex-start;padding:1rem 0;border-bottom:1px solid rgba(255,255,255,.06)}\n.step:last-child{border-bottom:none}\n.step-num{width:32px;height:32px;border-radius:50%;background:rgba(168,85,247,.2);color:#C99BFF;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}\n.step-num.done{background:#A855F7;color:#fff}\n.step-body{flex:1}\n.step-title{font-size:14px;font-weight:500;color:#e2e8f0;margin-bottom:.25rem}\n.step-desc{font-size:13px;color:#64748b;margin-bottom:.5rem}\n.step-check{display:flex;align-items:center;gap:.5rem;font-size:13px;color:#94a3b8;cursor:pointer}\n.step-check input{accent-color:#A855F7}\n.resource{display:flex;align-items:center;gap:.75rem;padding:.6rem .875rem;background:#0A0414;border:1px solid rgba(168,85,247,.2);border-radius:8px;margin-bottom:.5rem}\n.resource-icon{font-size:18px}\n.resource-name{font-size:13px;color:#e2e8f0}\n.resource-desc{font-size:11px;color:#64748b}\n\n/* ---- FlashFusion elevated layer ---- */\nbody{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}\nbody::before{content:\"\";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(620px 380px at 16% -8%,rgba(168,85,247,.16),transparent 70%),radial-gradient(520px 340px at 94% 2%,rgba(34,211,238,.08),transparent 70%)}\nh1{font-family:'Poppins',sans-serif;letter-spacing:-.02em}\ ne-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:12px;background:rgba(168,85,247,.15);color:#C99BFF;border:1px solid rgba(168,85,247,.3);cursor:pointer;margin:2px}\n.tag.on{background:#A855F7;color:#fff;border-color:#A855F7}\n.spec-output{background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:10px;padding:1.25rem;white-space:pre-wrap;font-size:13px;color:#cbd5e1;line-height:1.7;display:none;margin-top:1rem;font-family:monospace}\n\n/* ---- FlashFusion elevated layer ---- */\nbody{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}\nbody::before{content:\"\";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(620px 380px at 16% -8%,rgba(168,85,247,.16),transparent 70%),radial-gradient(520px 340px at 94% 2%,rgba(34,211,238,.08),transparent 70%)}\nh1{font-family:'Poppins',sans-serif;letter-spacing:-.02em}\n.brand{font-family:'JetBrains Mono',monospace;color:#A855F7;font-weight:500}\n.ct,.section-label{font-family:'JetBrains Mono',monospace}\n.card{border-color:rgba(168,85,247,.18);box-shadow:0 1px 0 rgba(255,255,255,.02) inset}\n.btn{background:linear-gradient(135deg,#A855F7,#9333EA);box-shadow:0 4px 16px rgba(168,85,247,.24);transition:filter .15s,box-shadow .15s}\n.btn:hover{background:linear-gradient(135deg,#A855F7,#9333EA);filter:brightness(1.09);box-shadow:0 6px 22px rgba(168,85,247,.34)}\n.btn-ghost{background:transparent;box-shadow:none}\ninput:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(168,85,247,.16)}\ncode{font-family:'JetBrains Mono',monospace}\n::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}\n@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}\n<\/style><\/head><body><div class=\"w\">\n<div class=\"brand\">FlashFusion AI Enablement<\/div>\n<h1>Agent Builder UI<\/h1>\n<p class=\"sub\">Compose an agent spec. Generates an n8n/Claude agent blueprint.<\/p>\n<div class=\"card\">\n<div class=\"ab-section\">\n<div class=\"ct\">Trigger<\/div>\n<div class=\"field\"><label>What kicks this agent off?<\/label>\n<select id=\"trigger\">\n<option value=\"form\">Form submission (e.g. audit scorecard)<\/option>\n<option value=\"email\">Incoming email<\/option>\n<option value=\"schedule\">Scheduled (daily / weekly)<\/option>\n<option value=\"webhook\">Webhook from another system<\/option>\n<option value=\"manual\">Manual / on-demand<\/option>\n<option value=\"crm\">CRM event (new lead, stage change)<\/option>\n<\/select>\n<\/div>\n<\/div>\n<div class=\"ab-section\">\n<div class=\"ct\">Tools the Agent Can Use<\/div>\n<div id=\"tools-grid\" style=\"margin-bottom:.5rem\"><\/div>\n<div style=\"font-size:12px;color:#64748b\">Click to toggle. Selected tools are included in the spec.<\/div>\n<\/div>\n<div class=\"ab-section\">\n<div class=\"ct\">Goal and Output<\/div>\n<div class=\"field\"><label>What should this agent accomplish?<\/label>\n<textarea id=\"goal\" rows=\"3\" placeholder=\"e.g. When an audit scorecard is submitted, analyze the gaps, draft a proposal, and notify me in Slack with a summary and the proposal link.\"><\/textarea>\n<\/div>\n<div class=\"field\"><label>Primary output<\/label>\n<select id=\"output\">\n<option value=\"doc\">Document (proposal, report, guide)<\/option>\n<option value=\"notification\">Notification (Slack, email)<\/option>\n<option value=\"crm\">CRM record update<\/option>\n<option value=\"calendar\">Calendar event or meeting prep<\/option>\n<option value=\"data\">Structured data / database entry<\/option>\n<\/select>\n<\/div>\n<\/div>\n<div class=\"ab-section\">\n<div class=\"ct\">Guardrails<\/div>\n<div class=\"field\"><label>What should this agent never do?<\/label>\n<textarea id=\"guardrails\" rows=\"2\" placeholder=\"e.g. Never send external emails without human review. Never access client data beyond the submitted form.\"><\/textarea>\n<\/div>\n<div class=\"field\"><label>Human-in-the-loop?<\/label>\n<select id=\"hitl\">\n<option value=\"always\">Always — human reviews before any action<\/option>\n<option value=\"notify\">Notify only — agent acts, human is informed<\/option>\n<option value=\"exception\">Exception only — human reviews if confidence is low<\/option>\n<option value=\"none\">None — fully automated<\/option>\n<\/select>\n<\/div>\n<\/div>\n<button class=\"btn\" style=\"width:100%\" onclick=\"buildSpec()\">Generate Agent Spec<\/button>\n<div class=\"spec-output\" id=\"spec\"><\/div>\n<button class=\"btn btn-ghost\" id=\"cpspec\" style=\"width:100%;display:none;margin-top:.75rem\" onclick=\"copySpec()\">Copy Spec<\/button>\n<\/div>\n<\/div>\n<script>\nvar TOOLS=[\"Claude (AI reasoning)\",\"n8n (workflow engine)\",\"Gmail\",\"Google Drive\",\"Notion\",\"HubSpot CRM\",\"Slack\",\"Apollo.io\",\"Stripe\",\"Google Calendar\",\"Airtable\",\"Linear\",\"GitHub\",\"PostHog\",\"Supabase\"];\nvar selected=new Set([\"Claude (AI reasoning)\",\"n8n (workflow engine)\",\"Notion\",\"Slack\"]);\nvar grid=document.getElementById(\"tools-grid\");\nTOOLS.forEach(function(t){\nvar btn=document.createElement(\"button\");\nbtn.className=\"tag\"+(selected.has(t)?\" on\":\"\");btn.textContent=t;\nbtn.onclick=function(){\nif(selected.has(t)){selected.delete(t);btn.classList.remove(\"on\");}\nelse{selected.add(t);btn.classList.add(\"on\");}\n};\ngrid.appendChild(btn);\n});\nvar TRIGGER_MAP={form:\"Form submission\",email:\"Incoming email\",schedule:\"Scheduled run\",webhook:\"Inbound webhook\",manual:\"Manual trigger\",crm:\"CRM event\"};\nvar OUTPUT_MAP={doc:\"Document generation\",notification:\"Notification dispatch\",crm:\"CRM update\",calendar:\"Calendar/scheduling\",data:\"Database entry\"};\nvar HITL_MAP={always:\"Full human review before any action\",notify:\"Agent acts, human notified\",exception:\"Human review on low-confidence outputs only\",none:\"Fully automated — no human in loop\"};\nfunction buildSpec(){\nvar trigger=document.getElementById(\"trigger\").value;\nvar goal=document.getElementById(\"goal\").value||\"[Define the agent goal]\";\nvar output=document.getElementById(\"output\").value;\nvar guardrails=document.getElementById(\"guardrails\").value||\"None specified\";\nvar hitl=document.getElementById(\"hitl\").value;\nvar toolList=Array.from(selected).join(\", \")||\"None selected\";\nvar spec=\"FLASHFUSION AGENT SPECIFICATION\\n\";\nspec+=\"══════════════════════════════════════════════════\\n\\n\";\nspec+=\"TRIGGER\\n──────────────────────────────────────────\\n\";\nspec+=TRIGGER_MAP[trigger]+\"\\n\\n\";\nspec+=\"TOOLS\\n──────────────────────────────────────────\\n\";\nspec+=toolList+\"\\n\\n\";\nspec+=\"GOAL\\n──────────────────────────────────────────\\n\";\nspec+=goal+\"\\n\\n\";\nspec+=\"PRIMARY OUTPUT\\n──────────────────────────────────────────\\n\";\nspec+=OUTPUT_MAP[output]+\"\\n\\n\";\nspec+=\"GUARDRAILS\\n──────────────────────────────────────────\\n\";\nspec+=guardrails+\"\\n\\n\";\nspec+=\"HUMAN-IN-THE-LOOP\\n──────────────────────────────────────────\\n\";\nspec+=HITL_MAP[hitl]+\"\\n\\n\";\nspec+=\"SUGGESTED N8N WORKFLOW STRUCTURE\\n──────────────────────────────────────────\\n\";\nspec+=\"1. \"+TRIGGER_MAP[trigger]+\" → validate inputs\\n\";\nspec+=\"2. Route to Claude for analysis/reasoning\\n\";\nspec+=\"3. Execute primary action (\"+OUTPUT_MAP[output]+\")\\n\";\nif(hitl!==\"none\") spec+=\"4. Human review gate → approve/reject\\n\";\nspec+=\"5. Dispatch notification → Slack/email\\n\";\nspec+=\"6. Log to Notion/Drive for audit trail\\n\\n\";\nspec+=\"NEXT STEP: Build this workflow in n8n at krosebrook.app.n8n.cloud\";\ndocument.getElementById(\"spec\").textContent=spec;\ndocument.getElementById(\"spec\").style.display=\"block\";\ndocument.getElementById(\"cpspec\").style.display=\"block\";\n}\nfunction copySpec(){\nnavigator.clipboard.writeText(document.getElementById(\"spec\").textContent).then(function(){\ncpspec.textContent=\"Copied!\";setTimeout(function(){cpspec.textContent=\"Copy Spec\"},2000);\n});\n}\n<\/script><\/body><\/html>","16-chaos-club-daily-dispatch.html":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<title>Chaos Club — Daily Dispatch Generator<\/title><style>*{box-sizing:border-box;margin:0;padding:0}\nbody{background:#0F0618;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;padding:2rem 1rem}\n.w{max-width:820px;margin:0 auto}\n.brand{font-size:12px;color:#e11d48;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}\nh1{font-size:24px;font-weight:600;margin-bottom:.4rem}\n.sub{font-size:14px;color:#94a3b8;margin-bottom:1.75rem}\n.card{background:#1A0B2E;border:1px solid rgba(225,29,72,.25);border-radius:12px;padding:1.5rem;margin-bottom:1rem}\n.ct{font-size:11px;color:#e11d48;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:1rem}\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}\n.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}\n.field{margin-bottom:.75rem}\nlabel{font-size:12px;color:#94a3b8;display:block;margin-bottom:.4rem}\ninput,select,textarea{width:100%;background:#0A0414;border:1px solid rgba(225,29,72,.3);border-radius:6px;color:#f1f5f9;padding:.5rem .75rem;font-size:13px;font-family:system-ui}\ninput:focus,select:focus,textarea:focus{outline:none;border-color:#e11d48}\n.btn{padding:.75rem 1.5rem;background:#e11d48;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}\n.btn:hover{background:#9333EA}\n.btn-ghost{background:transparent;border:1px solid rgba(225,29,72,.4);color:#fb7185}\n.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}\n.badge-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}\n.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}\n.badge-purple{background:rgba(225,29,72,.2);color:#fb7185;border:1px solid rgba(225,29,72,.3)}\n.mcard{background:rgba(225,29,72,.1);border:1px solid rgba(225,29,72,.2);border-radius:8px;padding:.875rem}\n.mlbl{font-size:11px;color:#64748b;margin-bottom:.3rem}\n.mval{font-size:22px;font-weight:600}\n.dispatch-out{background:#0A0414;border:1px solid rgba(225,29,72,.3);border-radius:10px;padding:1.5rem;white-space:pre-wrap;font-size:13px;color:#cbd5e1;line-height:1.8;display:none;margin-top:1rem}\n\n/* ---- FlashFusion elevated layer ---- */\nbody{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}\nbody::before{content:\"\";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(620px 380px at 16% -8%,rgba(168,85,247,.16),transparent 70%),radial-gradient(520px 340px at 94% 2%,rgba(34,211,238,.08),transparent 70%)}\nh1{font-family:'Poppins',sans-serif;letter-spacing:-.02em}\n.brand{font-family:'JetBrains Mono',monospace;color:#A855F7;font-weight:500}\n.ct,.section-label{font-family:'JetBrains Mono',monospace}\n.card{border-color:rgba(168,85,247,.18);box-shadow:0 1px 0 rgba(255,255,255,.02) inset}\n.btn{background:linear-gradient(135deg,#A855F7,#9333EA);box-shadow:0 4px 16px rgba(168,85,247,.24);transition:filter .15s,box-shadow .15s}\n.btn:hover{background:linear-gradient(135deg,#A855F7,#9333EA);filter:brightness(1.09);box-shadow:0 6px 22px rgba(168,85,247,.34)}\n.btn-ghost{background:transparent;box-shadow:none}\ninput:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(168,85,247,.16)}\ncode{font-family:'JetBrains Mono',monospace}\n::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}\n@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}\n<\/style><\/head><body><div class=\"w\">\n<div class=\"brand\" style=\"color:#e11d48\">Chaos Club Co.<\/div>\n<h1>Daily Dispatch Generator<\/h1>\n<p class=\"sub\">Generate peer support content for Chaos Club members. No pretending required.<\/p>\n<div class=\"card\"><div class=\"ct\">Today's Dispatch<\/div>\n<div class=\"g2\">\n<div class=\"field\"><label>Date<\/label><input id=\"dt\" type=\"date\"><\/div>\n<div class=\"field\"><label>Theme<\/label>\n<select id=\"theme\">\n<option value=\"accountability\">Accountability without shame<\/option>\n<option value=\"chaos\">Embracing the chaos<\/option>\n<option value=\"progress\">Progress over perfection<\/option>\n<option value=\"connection\">You belong here<\/option>\n<option value=\"reset\">Starting over (again)<\/option>\n<option value=\"energy\">Managing your energy<\/option>\n<option value=\"hard\">When it's just hard<\/option>\n<\/select>\n<\/div>\n<\/div>\n<div class=\"field\"><label>Tone today<\/label>\n<select id=\"tone\">\n<option value=\"honest\">Honest and direct<\/option>\n<option value=\"warm\">Warm and grounding<\/option>\n<option value=\"sharp\">Sharp and no-BS<\/option>\n<option value=\"quiet\">Quiet and steady<\/option>\n<\/select>\n<\/div>\n<div class=\"field\"><label>Optional: real signal from the community (what people are feeling)<\/label>\n<textarea id=\"signal\" rows=\"2\" placeholder=\"e.g. A lot of people posting about feeling behind this week.\"><\/textarea>\n<\/div>\n<\/div>\n<button class=\"btn\" style=\"width:100%;background:#e11d48;margin-bottom:.5rem\" onclick=\"generate()\">Generate Today's Dispatch<\/button>\n<div class=\"loading\" style=\"display:none;color:#fb7185;font-size:14px;text-align:center;padding:.5rem\" id=\"load\">Generating with Claude...<\/div>\n<div class=\"dispatch-out\" id=\"out\"><\/div>\n<button class=\"btn btn-ghost\" id=\"cp\" style=\"width:100%;display:none;margin-top:.75rem;border-color:rgba(225,29,72,.4);color:#fb7185\" onclick=\"copy()\">Copy Dispatch<\/button>\n<\/div>\n<\/div>\n<script>\nvar FALLBACKS={\naccountability:\"Some days accountability feels like a punishment. It isn't. It's just a mirror. You're not failing — you're looking at where you actually are. That's the only place anything real starts.\\n\\nToday: one honest look. Not at where you should be. At where you are. That's enough.\",\nchaos:\"The chaos isn't the problem. The pretending isn't the problem either — except it costs you energy you don't have. Today, try naming one thing that's actually chaotic instead of managing around it. You belong here even on the messy days.\",\nprogress:\"Progress doesn't always feel like progress. Sometimes it just feels like getting through the next hour. That counts. It has always counted.\\n\\nOne small thing forward today. That's the whole ask.\",\nconnection:\"You don't have to earn your place here by being okay. That's not how this works. The Club is for when you're not okay. Especially then.\",\nreset:\"Starting over is not failure. It is the move. Again. Whatever happened before this moment — you can begin from here.\",\nenergy:\"Your energy is a resource. Not a character flaw when it's low. Today: what drains it, what restores it. One of each. That's the whole equation.\",\nhard:\"Some days just are. No reframe makes it not hard. You don't have to turn this into a lesson. You're allowed to just move through it.\"\n};\ndocument.getElementById(\"dt\").value=new Date().toISOString().split(\"T\")[0];\nasync function generate(){\nvar theme=document.getElementById(\"theme\").value;\nvar tone=document.getElementById(\"tone\").value;\nvar signal=document.getElementById(\"signal\").value;\nvar date=document.getElementById(\"dt\").value;\nvar prompt=\"You are writing the Daily Dispatch for Chaos Club Co., a peer support platform with the philosophy: no masks required, no pretending, everyone belongs. Write a short daily message (150-200 words) with this theme: \"+theme+\". Tone: \"+tone+\". \"+( signal?\"Community signal: \"+signal+\".\")+\" Voice rules: direct, human, no recovery language, no toxic positivity, no 'you've got this' clichés. Write for someone who is having a genuinely hard day and needs to feel less alone — not more motivated. End with one small, specific, doable thing.\";\ndocument.getElementById(\"load\").style.display=\"block\";\ndocument.getElementById(\"out\").style.display=\"none\";\ndocument.getElementById(\"cp\").style.display=\"none\";\ntry{\nvar resp=await fetch(\"https://api.anthropic.com/v1/messages\",{\nmethod:\"POST\",headers:{\"Content-Type\":\"application/json\"},\nbody:JSON.stringify({model:\"claude-sonnet-4-20250514\",max_tokens:500,messages:[{role:\"user\",content:prompt}]})\n});\nvar data=await resp.json();\nvar text=data.content&&data.content[0]&&data.content[0].text?data.content[0].text:FALLBACKS[theme];\ndocument.getElementById(\"out\").textContent=\"CHAOS CLUB — DAILY DISPATCH\\n\"+date+\"\\n\\n\"+text+\"\\n\\n— The Club\";\n}catch(e){\ndocument.getElementById(\"out\").textContent=\"CHAOS CLUB — DAILY DISPATCH\\n\"+date+\"\\n\\n\"+FALLBACKS[theme]+\"\\n\\n— The Club\";\n}\ndocument.getElementById(\"load\").style.display=\"none\";\ndocument.getElementById(\"out\").style.display=\"block\";\ndocument.getElementById(\"cp\").style.display=\"block\";\n}\nfunction copy(){\nnavigator.clipboard.writeText(document.getElementById(\"out\").textContent).then(function(){\ncp.textContent=\"Copied!\";setTimeout(function(){cp.textContent=\"Copy Dispatch\"},2000);\n});\n}\n<\/script><\/body><\/html>"};
  var overlay=document.getElementById('toolOverlay');
  var frame=document.getElementById('toolFrame');
  var titleEl=document.getElementById('toolTitle');
  function open(f, name){
    if(!TOOLS_HTML[f]) return;
    frame.srcdoc=TOOLS_HTML[f];
    titleEl.textContent=name||'';
    overlay.classList.add('open');
    document.body.style.overflow='hidden';
  }
  function close(){
    overlay.classList.remove('open');
    frame.srcdoc='';
    document.body.style.overflow='';
  }
  document.addEventListener('click',function(e){
    var a=e.target.closest && e.target.closest('a.tool');
    if(!a) return;
    e.preventDefault();
    var f=a.getAttribute('href');
    var nm=a.querySelector('.tool-name');
    open(f, nm?nm.textContent:'');
  });
  document.getElementById('toolBack').addEventListener('click',close);
  document.addEventListener('keydown',function(e){ if(e.key==='Escape'&&overlay.classList.contains('open')) close(); });
})();
</script>

</body>
