<style>
  :root{
    --surface-base:#0F0618; --surface-raised:#1A0B2E;
    --border-faint:rgba(168,85,247,.10); --border-primary:rgba(168,85,247,.18); --border-active:rgba(168,85,247,.42);
    --accent:#A855F7; --cyan:#22D3EE; --pink:#F472B6;
    --gradient:linear-gradient(90deg,#A855F7 0%,#F472B6 55%,#22D3EE 100%);
    --text-primary:#F8FAFC; --text-secondary:#CBD5E1; --text-tertiary:#8B82A8; --text-faint:#5E5680;
    --glow:0 0 26px rgba(168,85,247,.18);
    --font-heading:'Poppins',sans-serif; --font-body:'Inter',system-ui,sans-serif; --font-code:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:var(--surface-base);color:var(--text-primary);font-family:var(--font-body);-webkit-font-smoothing:antialiased;min-height:100vh;position:relative;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(640px 400px at 16% -8%,rgba(168,85,247,.20),transparent 70%),radial-gradient(560px 360px at 92% 2%,rgba(34,211,238,.10),transparent 70%);}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}
  a{text-decoration:none;color:inherit;}
  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:58px 28px 100px;}
  .kicker{font-family:var(--font-code);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:9px;}
  .kicker::before{content:"";width:22px;height:1px;background:var(--accent);display:inline-block;}
  h1{font-family:var(--font-heading);font-weight:700;font-size:42px;letter-spacing:-.025em;line-height:1.04;margin:0 0 12px;}
  .grad{background:var(--gradient);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
  .lede{font-size:15px;line-height:1.6;color:var(--text-secondary);max-width:600px;margin:0;}
  .lede b{color:var(--text-primary);font-weight:600;}
  .count-strip{display:flex;gap:8px;margin-top:22px;}
  .cstat{display:flex;align-items:baseline;gap:7px;padding:8px 14px;border-radius:11px;background:rgba(26,11,46,.55);border:1px solid var(--border-faint);}
  .cstat .n{font-family:var(--font-heading);font-weight:600;font-size:16px;}
  .cstat .l{font-size:11px;color:var(--text-tertiary);}

  .group{margin-top:42px;}
  .group-head{display:flex;align-items:center;gap:11px;margin-bottom:16px;}
  .group-title{font-family:var(--font-heading);font-weight:600;font-size:15px;}
  .group-line{flex:1;height:1px;background:var(--border-faint);}
  .group-n{font-family:var(--font-code);font-size:12px;color:var(--text-faint);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px;}
  .tool{display:flex;flex-direction:column;gap:10px;padding:18px 18px 16px;border-radius:16px;background:rgba(26,11,46,.5);border:1px solid var(--border-primary);transition:border-color .18s,box-shadow .18s,transform .18s;position:relative;overflow:hidden;}
  .tool:hover{border-color:var(--border-active);box-shadow:var(--glow);transform:translateY(-2px);}
  .tool-top{display:flex;align-items:center;gap:11px;}
  .tool-ico{width:36px;height:36px;flex-shrink:0;display:grid;place-items:center;font-size:17px;border-radius:10px;background:var(--surface-raised);border:1px solid var(--border-faint);}
  .tool-num{margin-left:auto;font-family:var(--font-code);font-size:11px;color:var(--text-faint);}
  .tool-name{font-family:var(--font-heading);font-weight:600;font-size:15px;line-height:1.25;}
  .tool-desc{font-size:12.5px;color:var(--text-tertiary);line-height:1.5;text-wrap:pretty;}
  .tool-open{margin-top:auto;font-family:var(--font-code);font-size:11px;color:var(--cyan);display:flex;align-items:center;gap:5px;opacity:0;transform:translateX(-4px);transition:opacity .18s,transform .18s;}
  .tool:hover .tool-open{opacity:1;transform:translateX(0);}

  @media(max-width:600px){.wrap{padding:40px 18px 80px;}h1{font-size:32px;}}
  @media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}

  #toolOverlay{position:fixed;inset:0;z-index:200;background:var(--surface-base);display:none;flex-direction:column;}
  #toolOverlay.open{display:flex;}
  #toolBar{display:flex;align-items:center;gap:14px;padding:11px 18px;background:var(--surface-raised);border-bottom:1px solid var(--border-primary);}
  #toolBack{font-family:var(--font-code);font-size:12px;color:var(--cyan);background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.2);border-radius:8px;padding:7px 13px;cursor:pointer;transition:background .14s;}
  #toolBack:hover{background:rgba(34,211,238,.2);}
  #toolTitle{font-family:var(--font-heading);font-weight:600;font-size:14px;color:var(--text-primary);}
  #toolFrame{flex:1;width:100%;border:none;background:var(--surface-base);}

</style>

  <div class="wrap">
    <header>
      <div class="kicker">FlashFusion AI Enablement</div>
      <h1>Operator <span class="grad">Toolkit</span></h1>
      <p class="lede">Sixteen standalone tools for running the business — from <b>first contact</b> to <b>delivery</b> to <b>content</b>. Each opens on its own and saves your work locally.</p>
      <div class="count-strip">
        <div class="cstat"><span class="n">16</span><span class="l">tools</span></div>
        <div class="cstat"><span class="n">4</span><span class="l">workflows</span></div>
      </div>
    </header>
    <div id="groups"></div>
  </div>

  <script>
    const TOOLS = [
      { f:"01-roi-calculator.html",        name:"ROI Calculator",        ico:"🧮", desc:"Estimate a client's return before the first conversation.", g:"Sales & Pipeline" },
      { f:"02-discovery-scorecard.html",   name:"Discovery Scorecard",   ico:"📋", desc:"Score discovery calls against a weighted rubric.", g:"Sales & Pipeline" },
      { f:"05-proposal-builder.html",      name:"Proposal Builder",      ico:"📄", desc:"Assemble line-item proposals from reusable blocks.", g:"Sales & Pipeline" },
      { f:"07-pipeline-dashboard.html",    name:"Pipeline Dashboard",    ico:"📊", desc:"Track prospects from first contact to closed-won.", g:"Sales & Pipeline" },
      { f:"09-outreach-tracker.html",      name:"Outreach Tracker",      ico:"✉️", desc:"Log and follow up on every outbound touch.", g:"Sales & Pipeline" },
      { f:"10-battle-card-browser.html",   name:"Battle Card Browser",   ico:"⚔️", desc:"Competitive battle cards and objection handling.", g:"Sales & Pipeline" },

      { f:"06-audit-report-generator.html",name:"Audit Report Generator",ico:"🔍", desc:"Turn an AI-readiness audit into a client-ready report.", g:"Delivery & Clients" },
      { f:"04-sprint-tracker.html",        name:"Sprint Tracker",        ico:"🏃", desc:"Track an enablement sprint week by week.", g:"Delivery & Clients" },
      { f:"11-client-dashboard.html",      name:"Client Dashboard",      ico:"🗂️", desc:"A live status board for an active engagement.", g:"Delivery & Clients" },
      { f:"14-onboarding-hub.html",        name:"Onboarding Hub",        ico:"🚀", desc:"Guide a new client through onboarding steps.", g:"Delivery & Clients" },

      { f:"03-skills-browser.html",        name:"Skills Browser",        ico:"🧩", desc:"Browse 25 production-ready Claude skill packs.", g:"Enablement" },
      { f:"13-skills-gap-detector.html",   name:"Skills Gap Detector",   ico:"🎯", desc:"Spot which skills a team is missing.", g:"Enablement" },
      { f:"15-agent-builder-ui.html",      name:"Agent Builder",         ico:"🤖", desc:"Configure and spec out a custom agent.", g:"Enablement" },

      { f:"08-revenue-tracker.html",       name:"Revenue Tracker",       ico:"💰", desc:"Track MRR, deals, and revenue against target.", g:"Ops & Content" },
      { f:"12-newsletter-generator.html",  name:"Newsletter Generator",  ico:"📰", desc:"Draft a branded newsletter in minutes.", g:"Ops & Content" },
      { f:"16-chaos-club-daily-dispatch.html",name:"Daily Dispatch",     ico:"⚡", desc:"Generate the Chaos Club daily dispatch.", g:"Ops & Content" },
    ];
    const ORDER = ["Sales & Pipeline","Delivery & Clients","Enablement","Ops & Content"];
    const root = document.getElementById("groups");
    ORDER.forEach(g=>{
      const items = TOOLS.filter(t=>t.g===g);
      const sec = document.createElement("section");
      sec.className="group";
      sec.innerHTML = `<div class="group-head"><span class="group-title">${g}</span><span class="group-line"></span><span class="group-n">${items.length}</span></div>
        <div class="grid">`+items.map(t=>{
          const num = t.f.slice(0,2);
          return `<a class="tool" href="${t.f}">
            <div class="tool-top"><span class="tool-ico">${t.ico}</span><span class="tool-num">${num}</span></div>
            <div class="tool-name">${t.name}</div>
            <div class="tool-desc">${t.desc}</div>
            <div class="tool-open">Open tool →</div>
          </a>`;
        }).join("")+`</div>`;
      root.appendChild(sec);
    });
  </script>

  <div id="toolOverlay">
    <div id="toolBar">
      <button id="toolBack">← All tools</button>
      <span id="toolTitle"></span>
    </div>
    <iframe id="toolFrame" title="tool"></iframe>
  </div>

rem\">Overall progress<\/div>\n<div style=\"font-size:24px;font-weight:600\" id=\"ovr\">0%<\/div>\n<\/div>\n<div class=\"m\" style=\"background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:.875rem\">\n<div style=\"font-size:11px;color:#64748b;margin-bottom:.3rem\">Tasks complete<\/div>\n<div style=\"font-size:24px;font-weight:600\" id=\"tc\">0/0<\/div>\n<\/div>\n<div class=\"m\" style=\"background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:.875rem\">\n<div style=\"font-size:11px;color:#64748b;margin-bottom:.3rem\">Current week<\/div>\n<div style=\"font-size:24px;font-weight:600\" id=\"cw\">—<\/div>\n<\/div>\n<\/div>\n<\/div>\n<div id=\"weeks\"><\/div>\n<script>\nvar WEEKS=[\n{n:1,title:\"Audit and Discovery\",tasks:[\"Kickoff call — align on goals and stakeholders\",\"Conduct AI Setup Audit (scorecard + interview)\",\"Map current tool stack and workflows\",\"Identify top 3 automation opportunities\",\"Deliver audit report with gap analysis\"]},\n{n:2,title:\"Skill Pack Selection and Configuration\",tasks:[\"Select skill packs from library based on audit\",\"Configure skill packs for client's Claude environment\",\"Set up allowed-tools and trigger phrases\",\"Test skill activation across target workflows\",\"Client review of configured skill set\"]},\n{n:3,title:\"Pilot Deployment\",tasks:[\"Deploy skill packs to pilot user group (3-5 people)\",\"Run hands-on walkthrough session (60 min)\",\"Collect day-1 feedback via async form\",\"Troubleshoot any activation or trigger issues\",\"Document initial wins and friction points\"]},\n{n:4,title:\"Full Rollout and Training\",tasks:[\"Deploy to full team\",\"Deliver skills library user guide\",\"Run team training session (90 min)\",\"Set up usage tracking and feedback loop\",\"Identify candidates for custom skill development\"]},\n{n:5,title:\"Measurement and Handoff\",tasks:[\"Collect usage data and self-reported time savings\",\"Build ROI summary with actuals vs projections\",\"Deliver Sprint Summary Report\",\"Present retainer or follow-on options\",\"Handoff documentation and admin access\"]},\n];\nvar checks={};\nvar el=document.getElementById(\"weeks\");\nWEEKS.forEach(function(w){\nchecks[w.n]={};\nvar tasks=\"\";\nw.tasks.forEach(function(t,i){\nchecks[w.n][i]=false;\ntasks+='<div class=\"task\"><input type=\"checkbox\" id=\"c'+w.n+'_'+i+'\" onchange=\"updateProgress('+w.n+','+i+',this.checked)\"><label class=\"task-text\" id=\"tl'+w.n+'_'+i+'\" for=\"c'+w.n+'_'+i+'\">'+t+'<\/label><\/div>';\n});\nvar d=document.createElement(\"div\");d.className=\"week\";\nd.innerHTML='<div class=\"week-header\"><div class=\"week-num\">'+w.n+'<\/div><div class=\"week-title\">Week '+w.n+': '+w.title+'<\/div><div class=\"week-status\"><span class=\"badge badge-purple\" id=\"ws'+w.n+'\">0/'+w.tasks.length+'<\/span><\/div><\/div>'+tasks+'<div class=\"prog-bar\"><div class=\"prog-fill\" id=\"pf'+w.n+'\" style=\"width:0%\"><\/div><\/div>';\nel.appendChild(d);\n});\nfunction updateProgress(wn,ti,val){\nchecks[wn][ti]=val;\nvar el=document.getElementById(\"tl\"+wn+\"_\"+ti);\nel.classList.toggle(\"done\",val);\nvar done=Object.values(checks[wn]).filter(Boolean).length;\nvar total=Object.values(checks[wn]).length;\ndocument.getElementById(\"ws\"+wn).textContent=done+\"/\"+total;\ndocument.getElementById(\"pf\"+wn).style.width=(done/total*100)+\"%\";\nupdateOverall();\n}\nfunction updateOverall(){\nvar totalDone=0,totalAll=0;\nWEEKS.forEach(function(w){\ntotalDone+=Object.values(checks[w.n]).filter(Boolean).length;\ntotalAll+=Object.values(checks[w.n]).length;\n});\ndocument.getElementById(\"ovr\").textContent=Math.round(totalDone/totalAll*100)+\"%\";\ndocument.getElementById(\"tc\").textContent=totalDone+\"/\"+totalAll;\nvar cw=1;\nWEEKS.forEach(function(w){\nvar d=Object.values(checks[w.n]).filter(Boolean).length,t=Object.values(checks[w.n]).length;\nif(d===t) cw=Math.min(w.n+1,5);\n});\ndocument.getElementById(\"cw\").textContent=\"Week \"+cw;\n}\n<\/script><\/body><\/html>","05-proposal-builder.html":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<title>FF — Proposal Builder<\/title><style>*{box-sizing:border-box;margin:0;padding:0}\nbody{background:#0F0618;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;padding:2rem 1rem}\n.w{max-width:800px;margin:0 auto}\n.brand{font-size:12px;color:#A855F7;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}\nh1{font-size:24px;font-weight:600;margin-bottom:.4rem}\n.sub{font-size:14px;color:#94a3b8;margin-bottom:1.75rem}\n.card{background:#1A0B2E;border:1px solid rgba(168,85,247,.25);border-radius:12px;padding:1.5rem;margin-bottom:1rem}\n.ct{font-size:11px;color:#A855F7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:1rem}\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}\n.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}\n.field{margin-bottom:.75rem}\nlabel{font-size:12px;color:#94a3b8;display:block;margin-bottom:.4rem}\ninput,select,textarea{width:100%;background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:6px;color:#f1f5f9;padding:.5rem .75rem;font-size:13px;font-family:system-ui}\ninput:focus,select:focus,textarea:focus{outline:none;border-color:#A855F7}\n.btn{padding:.75rem 1.5rem;background:#A855F7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}\n.btn:hover{background:#9333EA}\n.btn-ghost{background:transparent;border:1px solid rgba(168,85,247,.4);color:#C99BFF}\n.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}\n.badge-purple{background:rgba(168,85,247,.2);color:#C99BFF;border:1px solid rgba(168,85,247,.3)}\n.badge-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}\n.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}\n.badge-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25)}\ntable{width:100%;border-collapse:collapse;font-size:13px}\nth{text-align:left;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;padding:.5rem .75rem;border-bottom:1px solid rgba(168,85,247,.15)}\ntd{padding:.6rem .75rem;border-bottom:1px solid rgba(255,255,255,.05);color:#cbd5e1}\ntr:hover td{background:rgba(168,85,247,.05)}\n.score-ring{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;border:3px solid;font-size:16px;font-weight:700}\n#output{background:#0A0414;border:1px solid rgba(168,85,247,.3);border-radius:10px;padding:1.5rem;white-space:pre-wrap;font-size:13px;color:#cbd5e1;line-height:1.7;font-family:system-ui;display:none;margin-top:1rem}\n.section-label{font-size:11px;color:#A855F7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:.5rem;margin-top:1rem}\n\n/* ---- FlashFusion elevated layer ---- */\nbody{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}\nbody::before{content:\"\";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(620px 380px at 16% -8%,rgba(168,85,247,.16),transparent 70%),radial-gradient(520px 340px at 94% 2%,rgba(34,211,238,.08),transparent 70%)}\nh1{font-family:'Poppins',sans-serif;letter-spacing:-.02em}\n.brand{font-family:'JetBrains Mono',monospace;color:#A855F7;font-weight:500}\n.ct,.section-label{font-family:'JetBrains Mono',monospace}\n.card{border-color:rgba(168,85,247,.18);box-shadow:0 1px 0 rgba(255,255,255,.02) inset}\n.btn{background:linear-gradient(135deg,#A855F7,#9333EA);box-shadow:0 4px 16px rgba(168,85,247,.24);transition:filter .15s,box-shadow .15s}\n.btn:hover{background:linear-gradient(135deg,#A855F7,#9333EA);filter:brightness(1.09);box-shadow:0 6px 22px rgba(168,85,247,.34)}\n.btn-ghost{background:transparent;box-shadow:none}\ninput:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(168,85,247,.16)}\ncode{font-family:'JetBrains Mono',monospace}\n::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}\n@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}\n<\/style><\/head><body><div class=\"w\">\n<div class=\"brand\">FlashFusion AI Enablement<\/div>\n<h1>Proposal Builder<\/h1>\n<p class=\"sub\">Fill from discovery notes — generates a formatted proposal draft.<\/p>\n<div class=\"card\"><div class=\"ct\">Client Info<\/div>\n<div class=\"g2\">\n<div class=\"field\"><label>Company name<\/label><input id=\"co\" placeholder=\"Acme Corp\"><\/div>\n<div class=\"field\"><label>Contact name and title<\/label><input id=\"ct\" placeholder=\"Jane Smith, VP Engineering\"><\/div>\n<\/div>\n<div class=\"field\"><label>Industry / company type<\/label><input id=\"ind\" placeholder=\"Healthcare SaaS, 400 employees\"><\/div>\n<\/div>\n<div class=\"card\"><div class=\"ct\">Problem (their words)<\/div>\n<div class=\"field\"><label>Pain point — what they said<\/label><textarea id=\"pain\" rows=\"3\" placeholder=\"e.g. Our auditor asked for AI agent documentation and we had nothing to show them.\"><\/textarea><\/div>\n<div class=\"field\"><label>Timeline pressure<\/label><input id=\"tl\" placeholder=\"e.g. SOC 2 renewal in Q3, board review in June\"><\/div>\n<div class=\"field\"><label>Current state<\/label><textarea id=\"curr\" rows=\"2\" placeholder=\"What they're doing now — manual, nothing, partial solution\"><\/textarea><\/div>\n<\/div>\n<div class=\"card\"><div class=\"ct\">Recommended Engagement<\/div>\n<div class=\"g2\">\n<div class=\"field\"><label>Primary service<\/label>\n<select id=\"svc\"><option value=\"audit\">AI Setup Audit — $4,500<\/option><option value=\"sprint\">Enablement Sprint — $5,000<\/option><option value=\"retainer\">Managed Retainer — $2,000/mo<\/option><\/select>\n<\/div>\n<div class=\"field\"><label>Engagement duration<\/label>\n<select id=\"dur\"><option value=\"1 week\">1 week (Audit)<\/option><option value=\"4-5 weeks\">4-5 weeks (Sprint)<\/option><option value=\"ongoing\">Ongoing (Retainer)<\/option><\/select>\n<\/div>\n<\/div>\n<div class=\"field\"><label>Key deliverables (one per line)<\/label><textarea id=\"dels\" rows=\"3\" placeholder=\"AI Setup Audit report&#10;Gap analysis and priority matrix&#10;Top 5 skill pack deployment&#10;Team training session\"><\/textarea><\/div>\n<\/div>\n<button class=\"btn\" style=\"width:100%;margin-bottom:1rem\" onclick=\"generate()\">Generate Proposal Draft<\/button>\n<div id=\"output\"><\/div>\n<button class=\"btn btn-ghost\" id=\"copy-btn\" style=\"width:100%;display:none;margin-top:.75rem\" onclick=\"copyProposal()\">Copy Proposal to Clipboard<\/button>\n<\/div>\n<script>\nvar SVC_MAP={audit:\"AI Setup Audit\",sprint:\"Enablement Sprint\",retainer:\"Managed Retainer\"};\nvar PRICE_MAP={audit:\"$4,500\",sprint:\"$5,000\",retainer:\"$2,000/month\"};\nfunction generate(){\nvar co=document.getElementById(\"co\").value||\"[Company]\";\nvar ct=document.getElementById(\"ct\").value||\"[Contact]\";\nvar ind=document.getElementById(\"ind\").value||\"[Industry]\";\nvar pain=document.getElementById(\"pain\").value||\"[Pain point]\";\nvar tl=document.getElementById(\"tl\").value||\"[Timeline]\";\nvar curr=document.getElementById(\"curr\").value||\"[Current state]\";\nvar svc=document.getElementById(\"svc\").value;\nvar dur=document.getElementById(\"dur\").value;\nvar dels=document.getElementById(\"dels\").value.split(\"\\n\").filter(Boolean);\nvar d=new Date();var dateStr=d.toLocaleDateString(\"en-US\",{month:\"long\",day:\"numeric\",year:\"numeric\"});\nvar validDate=new Date(d.getTime()+30*86400000).toLocaleDateString(\"en-US\",{month:\"long\",day:\"numeric\",year:\"numeric\"});\nvar delStr=dels.map(function(x){return \"  • \"+x}).join(\"\\n\")||\"  • [Define deliverables]\";\nvar out=\"FLASHFUSION — \"+SVC_MAP[svc].toUpperCase()+\" PROPOSAL\\n\";\nout+=\"══════════════════════════════════════════════════\\n\\n\";\nout+=\"Prepared for: \"+ct+\" — \"+co+\"\\n\";\nout+=\"Prepared by: Kyle Rosebrook — FlashFusion\\n\";\nout+=\"Date: \"+dateStr+\"\\nValid through: \"+validDate+\"\\n\\n\";\nout+=\"──────────────────────────────────────────────────\\n\";\nout+=\"EXECUTIVE SUMMARY\\n\";\nout+=\"──────────────────────────────────────────────────\\n\\n\";\nout+=co+\" is deploying AI tools across \"+ind+\". As those deployments scale, \\nthe question of governance, auditability, and measurable ROI becomes unavoidable.\\n\\n\";\nout+='This proposal outlines a '+dur+' '+SVC_MAP[svc]+' to help '+co+' answer that question — \\nwith a clear picture of what's working, what's missing, and what to do next.\\n\\n';\nout+=\"──────────────────────────────────────────────────\\n\";\nout+=\"THE PROBLEM WE'RE SOLVING\\n\";\nout+=\"──────────────────────────────────────────────────\\n\\n\";\nout+='\"'+pain+'\"\\n\\n';\nout+=\"Current state: \"+curr+\"\\n\";\nout+=\"Timeline pressure: \"+tl+\"\\n\\n\";\nout+=\"──────────────────────────────────────────────────\\n\";\nout+=\"SCOPE OF WORK\\n\";\nout+=\"──────────────────────────────────────────────────\\n\\n\";\nout+=\"Service: \"+SVC_MAP[svc]+\"\\n\";\nout+=\"Duration: \"+dur+\"\\n\";\nout+=\"Investment: \"+PRICE_MAP[svc]+\"\\n\\n\";\nout+=\"Deliverables:\\n\"+delStr+\"\\n\\n\";\nout+=\"──────────────────────────────────────────────────\\n\";\nout+=\"INVESTMENT AND NEXT STEPS\\n\";\nout+=\"──────────────────────────────────────────────────\\n\\n\";\nout+=\"To move forward:\\n\";\nout+=\"  1. Reply with approval or questions\\n\";\nout+=\"  2. FlashFusion sends SOW for signature\\n\";\nout+=\"  3. Kickoff scheduled within 5 business days\\n\\n\";\nout+=\"Questions: kyle@flashfusion.co\\n\";\nout+=\"Audit: audit.flashfusion.co\";\ndocument.getElementById(\"output\").textContent=out;\ndocument.getElementById(\"output\").style.display=\"block\";\ndocument.getElementById(\"copy-btn\").style.display=\"block\";\n}\nfunction copyProposal(){\nnavigator.clipboard.writeText(document.getElementById(\"output\").textContent).then(function(){\ndocument.getElementById(\"copy-btn\").textContent=\"Copied!\";\nsetTimeout(function(){document.getElementById(\"copy-btn\").textContent=\"Copy Proposal to Clipboard\"},2000);\n});\n}\n<\/script><\/body><\/html>","06-audit-report-generator.html":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<title>FF — Audit Report Generator<\/title><style>*{box-sizing:border-box;margin:0;padding:0}\nbody{background:#0F0618;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;padding:2rem 1rem}\n.w{max-width:820px;margin:0 auto}\n.brand{font-size:12px;color:#A855F7;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}\nh1{font-size:24px;font-weight:600;margin-bottom:.4rem}\n.sub{font-size:14px;color:#94a3b8;margin-bottom:1.75rem}\n.card{background:#1A0B2E;border:1px solid rgba(168,85,247,.25);border-radius:12px;padding:1.5rem;margin-bottom:1rem}\n.ct{font-size:11px;color:#A855F7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:1rem}\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}\n.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}\n.g4{display:grid;grid-template-columns:rep \n::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}\n@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}\n<\/style><\/head><body><div class=\"w\">\n<div class=\"brand\">FlashFusion AI Enablement<\/div>\n<h1>AI Setup Audit Report Generator<\/h1>\n<p class=\"sub\">Score the client's setup — generates a formatted audit report.<\/p>\n<div class=\"card\"><div class=\"ct\">Client<\/div>\n<div class=\"g2\">\n<div class=\"field\"><label>Company<\/label><input id=\"co\" placeholder=\"Acme Corp\"><\/div>\n<div class=\"field\"><label>Auditor<\/label><input id=\"aud\" value=\"Kyle Rosebrook — FlashFusion\"><\/div>\n<\/div>\n<div class=\"g2\">\n<div class=\"field\"><label>Audit date<\/label><input id=\"dt\" type=\"date\"><\/div>\n<div class=\"field\"><label>Primary use case<\/label><input id=\"uc\" placeholder=\"e.g. Support ticket triage, document drafting\"><\/div>\n<\/div>\n<\/div>\n<div class=\"card\"><div class=\"ct\">Dimension Scores (1–10)<\/div>\n<div id=\"dims\"><\/div>\n<\/div>\n<div class=\"card\"><div class=\"ct\">Gaps Identified<\/div>\n<div id=\"gaps\"><\/div>\n<\/div>\n<div class=\"card\"><div class=\"ct\">Recommended Actions<\/div>\n<div class=\"field\"><label>Top recommendation<\/label><input id=\"rec1\" placeholder=\"e.g. Deploy 5 core skill packs for the support team\"><\/div>\n<div class=\"field\"><label>Second recommendation<\/label><input id=\"rec2\" placeholder=\"e.g. Establish prompt governance policy\"><\/div>\n<div class=\"field\"><label>Third recommendation<\/label><input id=\"rec3\" placeholder=\"e.g. Set up usage tracking with PostHog\"><\/div>\n<div class=\"field\"><label>Recommended next step<\/label>\n<select id=\"next\"><option value=\"audit\">Full Enablement Sprint — $5,000<\/option><option value=\"retainer\">Managed Retainer — $2,000/mo<\/option><option value=\"custom\">Custom skill development<\/option><option value=\"none\">No immediate commercial next step<\/option><\/select>\n<\/div>\n<\/div>\n<button class=\"btn\" style=\"width:100%;margin-bottom:1rem\" onclick=\"generate()\">Generate Audit Report<\/button>\n<div id=\"report\"><\/div>\n<button class=\"btn btn-ghost\" id=\"cb\" style=\"width:100%;display:none;margin-top:.75rem\" onclick=\"copy()\">Copy Report<\/button>\n<\/div>\n<script>\nvar DIMS=[\n{id:\"tools\",name:\"Tool selection fit\",desc:\"Are the right AI tools chosen for the use case?\"},\n{id:\"prompts\",name:\"Prompt quality\",desc:\"Are prompts structured, specific, and consistent?\"},\n{id:\"skills\",name:\"Skill deployment\",desc:\"Are skill packs or custom instructions in use?\"},\n{id:\"governance\",name:\"Governance and policy\",desc:\"Are there usage policies, guardrails, and approval flows?\"},\n{id:\"training\",name:\"Team training\",desc:\"Does the team know how to use AI tools effectively?\"},\n{id:\"measurement\",name:\"Measurement\",desc:\"Are time savings and ROI being tracked?\"},\n{id:\"integration\",name:\"Stack integration\",desc:\"Are AI tools connected to existing workflows and systems?\"},\n{id:\"security\",name:\"Data security\",desc:\"Is sensitive data handled according to policy?\"},\n]\nvar scores={};\nvar el=document.getElementById(\"dims\");\nDIMS.forEach(function(d){\nscores[d.id]=5;\nvar row=document.createElement(\"div\");row.style.marginBottom=\"1rem\";\nrow.innerHTML='<div style=\"display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem\"><span style=\"font-size:13px;font-weight:500;color:#e2e8f0\">'+d.name+'<\/span><span style=\"font-size:12px;color:#64748b\">— '+d.desc+'<\/span><\/div><div class=\"slider-row\"><input type=\"range\" min=\"1\" max=\"10\" value=\"5\" oninput=\"setScore(\\'' + d.id + '\\',this.value,this.nextElementSibling)\"><span class=\"sval\">5<\/span><span style=\"font-size:12px;color:#64748b\">/10<\/span><\/div>';\nel.appendChild(row);\n});\nfunction setScore(id,v,el){scores[id]=+v;el.textContent=v;}\nvar GAPS=[\n{label:\"No skill packs deployed\",sev:\"h\"},{label:\"Prompts are ad-hoc and inconsistent\",sev:\"h\"},\n{label:\"No usage policy in place\",sev:\"h\"},{label:\"No measurement or ROI tracking\",sev:\"m\"},\n{label:\"AI tools not connected to workflows\",sev:\"m\"},{label:\"Team has not been trained\",sev:\"m\"},\n{label:\"Tool selection not optimized for use case\",sev:\"m\"},{label:\"Data handling policy unclear\",sev:\"h\"},\n{label:\"No governance or approval flows\",sev:\"l\"},{label:\"Prompt library not maintained\",sev:\"l\"},\n];\nvar gapEl=document.getElementById(\"gaps\");\nvar gapChecks={};\nGAPS.forEach(function(g,i){\ngapChecks[i]=false;\nvar sevClass=\"sev-\"+(g.sev===\"h\"?\"h\":g.sev===\"m\"?\"m\":\"l\");\nvar sevLabel=g.sev===\"h\"?\"High\":g.sev===\"m\"?\"Medium\":\"Low\";\nvar row=document.createElement(\"div\");row.className=\"gap-row\";\nrow.innerHTML='<input type=\"checkbox\" id=\"g'+i+'\" onchange=\"gapChecks['+i+']=this.checked\"><label class=\"gap-label\" for=\"g'+i+'\">'+g.label+'<\/label><span class=\"sev '+sevClass+'\">'+sevLabel+'<\/span>';\ngapEl.appendChild(row);\n});\nfunction generate(){\nvar co=document.getElementById(\"co\").value||\"[Company]\";\nvar aud=document.getElementById(\"aud\").value;\nvar dt=document.getElementById(\"dt\").value;\nvar uc=document.getElementById(\"uc\").value||\"[Use case]\";\nvar total=Object.values(scores).reduce(function(a,b){return a+b},0);\nvar max=DIMS.length*10;\nvar pct=Math.round(total/max*100);\nvar level=pct>=80?\"Strong\":pct>=60?\"Developing\":pct>=40?\"Early-stage\":\"Critical gaps\";\nvar gapsList=GAPS.filter(function(g,i){return gapChecks[i]}).map(function(g){\nreturn \"  [\"+((g.sev===\"h\")?\"HIGH\":(g.sev===\"m\")?\"MED\":\"LOW\")+\"] \"+g.label;\n}).join(\"\\n\")||\"  None identified\";\nvar recs=[\"  1. \"+(rec1.value||\"[Add recommendation]\"),\"  2. \"+(rec2.value||\"[Add recommendation]\"),\"  3. \"+(rec3.value||\"[Add recommendation]\")].join(\"\\n\");\nvar out=\"FLASHFUSION — AI SETUP AUDIT REPORT\\n\";\nout+=\"══════════════════════════════════════════════════\\n\";\nout+=\"Company: \"+co+\"\\nAuditor: \"+aud+\"\\nDate: \"+dt+\"\\nUse case: \"+uc+\"\\n\\n\";\nout+=\"OVERALL AI READINESS SCORE: \"+total+\"/\"+max+\" (\"+pct+\"%) — \"+level+\"\\n\\n\";\nout+=\"──────────────────────────────────────────────────\\n\";\nout+=\"DIMENSION SCORES\\n──────────────────────────────────────────────────\\n\";\nDIMS.forEach(function(d){out+=\"  \"+d.name.padEnd(30)+scores[d.id]+\"/10\\n\";});\nout+=\"\\n──────────────────────────────────────────────────\\n\";\nout+=\"GAPS IDENTIFIED\\n──────────────────────────────────────────────────\\n\";\nout+=gapsList+\"\\n\\n\";\nout+=\"──────────────────────────────────────────────────\\n\";\nout+=\"RECOMMENDATIONS\\n──────────────────────────────────────────────────\\n\";\nout+=recs+\"\\n\\n\";\nout+=\"RECOMMENDED NEXT STEP: \"+document.getElementById(\"next\").options[document.getElementById(\"next\").selectedIndex].text+\"\\n\\n\";\nout+=\"──────────────────────────────────────────────────\\n\";\nout+=\"Questions: kyle@flashfusion.co | audit.flashfusion.co\";\ndocument.getElementById(\"report\").textContent=out;\ndocument.getElementById(\"report\").style.display=\"block\";\ndocument.getElementById(\"cb\").style.display=\"block\";\n}\nfunction copy(){\nnavigator.clipboard.writeText(document.getElementById(\"report\").textContent).then(function(){\ncb.textContent=\"Copied!\";setTimeout(function(){cb.textContent=\"Copy Report\"},2000);\n});\n}\ndocument.getElementById(\"dt\").value=new Date().toISOString().split(\"T\")[0];\n<\/script><\/body><\/html>","07-pipeline-dashboard.html":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&d ound:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}\ntable{width:100%;border-collapse:collapse;font-size:13px}\nth{text-align:left;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;padding:.5rem .75rem;border-bottom:1px solid rgba(168,85,247,.15)}\ntd{padding:.6rem .75rem;border-bottom:1px solid rgba(255,255,255,.05);color:#cbd5e1;vertical-align:top}\ntr:hover td{background:rgba(168,85,247,.04)}\n.mcard{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:.875rem}\n.mlbl{font-size:11px;color:#64748b;margin-bottom:.3rem}\n.mval{font-size:22px;font-weight:600}\n.msub{font-size:10px;color:#475569;margin-top:.2rem}\n.stage{text-align:center;padding:.75rem;border-radius:8px;border:1px solid rgba(168,85,247,.2);cursor:pointer}\n.stage.active{border-color:#A855F7;background:rgba(168,85,247,.12)}\n.stage-num{font-size:22px;font-weight:700;color:#C99BFF}\n.stage-lbl{font-size:11px;color:#64748b;margin-top:.2rem}\n.add-form{display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}\n.add-form input,.add-form select{flex:1;min-width:140px}\n.pipe-table{width:100%;border-collapse:collapse}\n.pipe-table th{text-align:left;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;padding:.5rem .75rem;border-bottom:1px solid rgba(168,85,247,.15)}\n.pipe-table td{padding:.625rem .75rem;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;color:#cbd5e1}\n.pipe-table tr:hover td{background:rgba(168,85,247,.04)}\n.del-btn{background:none;border:none;color:#475569;cursor:pointer;font-size:16px;padding:0 4px}\n.del-btn:hover{color:#f87171}\n.move-btn{background:none;border:1px solid rgba(168,85,247,.3);color:#C99BFF;cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px}\n.move-btn:hover{background:rgba(168,85,247,.15)}\n\n/* ---- FlashFusion elevated layer ---- */\nbody{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;position:relative}\nbody::before{content:\"\";position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(620px 380px at 16% -8%,rgba(168,85,247,.16),transparent 70%),radial-gradient(520px 340px at 94% 2%,rgba(34,211,238,.08),transparent 70%)}\nh1{font-family:'Poppins',sans-serif;letter-spacing:-.02em}\n.brand{font-family:'JetBrains Mono',monospace;color:#A855F7;font-weight:500}\n.ct,.section-label{font-family:'JetBrains Mono',monospace}\n.card{border-color:rgba(168,85,247,.18);box-shadow:0 1px 0 rgba(255,255,255,.02) inset}\n.btn{background:linear-gradient(135deg,#A855F7,#9333EA);box-shadow:0 4px 16px rgba(168,85,247,.24);transition:filter .15s,box-shadow .15s}\n.btn:hover{background:linear-gradient(135deg,#A855F7,#9333EA);filter:brightness(1.09);box-shadow:0 6px 22px rgba(168,85,247,.34)}\n.btn-ghost{background:transparent;box-shadow:none}\ninput:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(168,85,247,.16)}\ncode{font-family:'JetBrains Mono',monospace}\n::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:rgba(168,85,247,.22);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,.36)}\n@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}\n<\/style><\/head><body><div class=\"w\">\n<div class=\"brand\">FlashFusion AI Enablement<\/div>\n<h1>Pipeline Dashboard<\/h1>\n<p class=\"sub\">Track prospects from first contact to closed. $222K Y1 target.<\/p>\n<div class=\"card g4\" id=\"stages\"><\/div>\n<div class=\"card\" style=\"margin-top:-.25rem\">\n<div class=\"ct\">Add Prospect<\/div>\n<div class=\"add-form\">\n<input id=\"pname\" placeholder=\"Company name\">\n<input id=\"pcont\" placeholder=\"Contact name\">\n<select id=\"pstage\"><option value=\"0\">Lead<\/option><option value=\"1\">Qualified<\/option><option value=\"2\">Proposal sent<\/option><option value=\"3\">Negotiating<\/option><option value=\"4\">Closed<\/option><\/select>\n<select id=\"pprod\"><option value=\"4500\">Audit — $4,500<\/option><option value=\"5000\">Sprint — $5,000<\/option><option value=\"24000\">Retainer — $2K/mo (12mo)<\/option><option value=\"0\">TBD<\/option><\/select>\n<button class=\"btn\" onclick=\"addProspect()\">Add<\/button>\n<\/div>\n<table class=\"pipe-table\"><thead><tr><th>Company<\/th><th>Contact<\/th><th>Stage<\/th><th>Value<\/th><th>Added<\/th><th><\/th><\/tr><\/thead>\n<tbody id=\"ptbl\"><\/tbody><\/table>\n<div id=\"empty\" style=\"text-align:center;padding:2rem;color:#475569;font-size:14px\">No prospects yet — add one above<\/div>\n<\/div>\n<div class=\"card\"><div class=\"ct\">Target Tracking<\/div>\n<div class=\"g3\">\n<div class=\"mcard\"><div class=\"mlbl\">Y1 Target<\/div><div class=\"mval\" style=\"color:#f1f5f9\">$222,000<\/div><\/div>\n<div class=\"mcard\"><div class=\"mlbl\">Pipeline value<\/div><div class=\"mval\" id=\"pval\" style=\"color:#C99BFF\">$0<\/div><\/div>\n<div class=\"mcard\"><div class=\"mlbl\">Closed (won)<\/div><div class=\"mval\" id=\"pclose\" style=\"color:#34d399\">$0<\/div><\/div>\n<\/div>\n<\/div>\n<\/div>\n<script>\nvar STAGES=[\"Lead\",\"Qualified\",\"Proposal sent\",\"Negotiating\",\"Closed won\"];\nvar STAGE_COLORS=[\"badge-blue\",\"badge-purple\",\"badge-amber\",\"badge-amber\",\"badge-green\"];\nvar prospects=[];\nvar el=document.getElementById(\"stages\");\nSTAGES.forEach(function(s,i){\nvar d=document.createElement(\"div\");d.className=\"stage\";d.id=\"st\"+i;\nd.innerHTML='<div class=\"stage-num\" id=\"sn'+i+'\">0<\/div><div class=\"stage-lbl\">'+s+'<\/div>';\nel.appendChild(d);\n});\nfunction addProspect(){\nvar n=document.getElementById(\"pname\").value.trim();\nif(!n) return;\nprospects.push({\nid:Date.now(),name:n,contact:document.getElementById(\"pcont\").value,\nstage:+document.getElementById(\"pstage\").value,\nvalue:+document.getElementById(\"pprod\").value,\ndate:new Date().toLocaleDateString()\n});\ndocument.getElementById(\"pname\").value=\"\";document.getElementById(\"pcont\").value=\"\";\nrender();\n}\nfunction advance(id){\nvar p=prospects.find(function(x){return x.id===id});\nif(p&&p.stage<4){p.stage++;render();}\n}\nfunction remove(id){\nprospects=prospects.filter(function(x){return x.id!==id});render();\n}\nfunction render(){\nvar counts=[0,0,0,0,0],pipeline=0,closed=0;\nprospects.forEach(function(p){\ncounts[p.stage]++;\nif(p.stage<4) pipeline+=p.value;\nif(p.stage===4) closed+=p.value;\n});\ncounts.forEach(function(c,i){document.getElementById(\"sn\"+i).textContent=c;});\ndocument.getElementById(\"pval\").textContent=\"$\"+pipeline.toLocaleString();\ndocument.getElementById(\"pclose\").textContent=\"$\"+closed.toLocaleString();\nvar tbl=document.getElementById(\"ptbl\");tbl.innerHTML=\"\";\ndocument.getElementById(\"empty\").style.display=prospects.length?\"none\":\"block\";\nprospects.forEach(function(p){\nvar tr=document.createElement(\"tr\");\ntr.innerHTML='<td style=\"font-weight:500;color:#e2e8f0\">'+p.name+'<\/td><td>'+p.contact+'<\/td><td><span class=\"badge '+STAGE_COLORS[p.stage]+'\">'+STAGES[p.stage]+'<\/span><\/td><td style=\"color:#C99BFF\">'+( p.value?\"$\"+p.value.toLocaleString():\"TBD\")+'<\/td><td style=\"color:#64748b\">'+p.date+'<\/td><td><button class=\"move-btn\" onclick=\"advance('+p.id+')\" title=\"Advance stage\">→<\/button> <button class=\"del-btn\" onclick=\"remove('+p.id+')\" title=\"Remove\">×<\/button><\/td>';\ntbl.appendChild(tr);\n});\n}\nrender();\n<\/script><\/body><\/html>","08-revenue-tracker.html":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<title>FF — Revenue Tracker<\/title><style>*{box-sizing:border-box;margin:0;padding:0}\nbody{b
