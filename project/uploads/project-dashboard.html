<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface-2:#1a1a26;--border:#2a2a3a;--text:#e4e4ef;--text-dim:#8888a0;--accent:#6c5ce7;--green:#00b894;--orange:#e17055;--red:#d63031;--focus-ring:0 0 0 2px var(--accent);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px;max-width:800px;margin:0 auto;}
:focus-visible{outline:none;box-shadow:var(--focus-ring);}
@media(prefers-reduced-motion:reduce){*{animation-duration:0s!important;transition-duration:0s!important;}}
.header{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.header h1{font-size:20px;font-weight:600;}
.header h1 .hl{color:var(--accent);}
.links{display:flex;gap:10px;}
.links a,.links button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;text-decoration:none;transition:all .15s;}
.links a:hover,.links button:hover{border-color:var(--accent);}
.progress-bar{width:100%;height:6px;background:var(--surface-2);border-radius:3px;margin-bottom:24px;overflow:hidden;}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .4s;}
.stats{display:flex;gap:20px;margin-bottom:20px;font-size:13px;color:var(--text-dim);}
.stats strong{color:var(--text);}
.section{margin-bottom:24px;}
.section h2{font-size:13px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.checklist{list-style:none;}
.checklist li{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:6px;font-size:14px;line-height:1.5;cursor:pointer;user-select:none;transition:background .1s;}
.checklist li:hover{background:var(--surface);}
.checklist li.checked{color:var(--text-dim);text-decoration:line-through;}
.checklist li input[type="checkbox"]{appearance:none;width:18px;height:18px;min-width:18px;border:2px solid var(--border);border-radius:4px;margin-top:2px;cursor:pointer;position:relative;transition:all .15s;}
.checklist li input:checked{background:var(--green);border-color:var(--green);}
.checklist li input:checked::after{content:'';position:absolute;left:4px;top:1px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);}
.checklist li input:focus-visible{box-shadow:var(--focus-ring);}
.add-item{display:flex;gap:8px;margin-top:12px;}
.add-item input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;font-family:inherit;}
.add-item input::placeholder{color:var(--text-dim);}
.add-item button{background:var(--accent);border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;}
.notes{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:20px;}
.notes h3{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.notes textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:inherit;font-size:13px;line-height:1.6;resize:vertical;min-height:80px;}
.notes textarea:focus{outline:none;}
</style>
</head>
<body>

<div class="header">
  <h1><span class="hl" id="projName">Project</span> Dashboard</h1>
  <div class="links">
    <a href="D:/02_Homebase/00_Core/06_Checklists/master-dashboard.html" id="masterLink">Master Dashboard</a>
    <button id="exportBtn">Export</button>
  </div>
</div>

<div class="progress-bar"><div class="fill" id="progressFill"></div></div>
<div class="stats" role="status" aria-live="polite">
  <span><strong id="sDone">0</strong> done</span>
  <span><strong id="sTotal">0</strong> total</span>
  <span><strong id="sPct">0</strong>% complete</span>
</div>

<div id="sections"></div>

<div class="add-item">
  <input type="text" id="newItem" placeholder="Add a new checklist item..." aria-label="New checklist item" />
  <button id="addBtn">Add</button>
</div>

<div class="notes">
  <h3>Notes</h3>
  <textarea id="notesArea" placeholder="Project notes, decisions, context..." aria-label="Project notes"></textarea>
</div>

<script>
// Project-specific storage key based on folder path
const PATH = window.location.pathname.replace(/\/[^/]*$/, '').replace(/\//g, '_');
const SK = 'project-checklist-' + PATH;
const NK = 'project-notes-' + PATH;

// Default sections — these get customized when setup-project.bat runs
const DEFAULT_SECTIONS = {
  'Getting Started': [
    'Initial project review',
    'Document project structure',
    'Identify immediate priorities',
    'Set up development environment',
    'Define success criteria'
  ]
};

function loadState() {
  try { return JSON.parse(localStorage.getItem(SK)) || null; } catch { return null; }
}
function saveState(s) { localStorage.setItem(SK, JSON.stringify(s)); }

function initState() {
  let state = loadState();
  if (!state) {
    state = { sections: DEFAULT_SECTIONS, checked: {} };
    saveState(state);
  }
  return state;
}

function render() {
  const state = loadState() || initState();
  const container = document.getElementById('sections');
  container.innerHTML = '';
  let total = 0, done = 0;

  Object.entries(state.sections).forEach(([secName, items]) => {
    const sec = document.createElement('div');
    sec.className = 'section';
    let html = `<h2>${secName}</h2><ul class="checklist" role="group" aria-label="${secName}">`;
    items.forEach((item, i) => {
      const key = secName + '::' + item;
      const checked = state.checked[key];
      total++;
      if (checked) done++;
      html += `<li${checked ? ' class="checked"' : ''} tabindex="0" role="checkbox" aria-checked="${!!checked}">
        <input type="checkbox" ${checked ? 'checked' : ''} data-key="${key}" tabindex="-1">
        <span>${item}</span></li>`;
    });
    html += '</ul>';
    sec.innerHTML = html;

    sec.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', e => {
        const s = loadState();
        s.checked[e.target.dataset.key] = e.target.checked;
        saveState(s);
        render();
      });
    });
    sec.querySelectorAll('.checklist li').forEach(li => {
      li.addEventListener('click', e => {
        if (e.target.tagName === 'INPUT') return;
        const cb = li.querySelector('input');
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
      });
      li.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          const cb = li.querySelector('input');
          cb.checked = !cb.checked;
          cb.dispatchEvent(new Event('change'));
        }
      });
    });

    container.appendChild(sec);
  });

  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('sDone').textContent = done;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sPct').textContent = pct;

  // Set project name from folder
  const folderName = decodeURIComponent(window.location.pathname.split('/').filter(Boolean).pop() || 'Project');
  document.getElementById('projName').textContent = folderName;
  document.title = folderName + ' — Project Dashboard';
}

// Add item
document.getElementById('addBtn').addEventListener('click', () => {
  const input = document.getElementById('newItem');
  const text = input.value.trim();
  if (!text) return;
  const state = loadState();
  const firstSection = Object.keys(state.sections)[0];
  state.sections[firstSection].push(text);
  saveState(state);
  input.value = '';
  render();
});
document.getElementById('newItem').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});

// Notes
const notesArea = document.getElementById('notesArea');
notesArea.value = localStorage.getItem(NK) || '';
notesArea.addEventListener('input', () => localStorage.setItem(NK, notesArea.value));

// Export
document.getElementById('exportBtn').addEventListener('click', () => {
  const state = loadState();
  let md = `# ${document.getElementById('projName').textContent}\n_${new Date().toISOString().split('T')[0]}_\n\n`;
  Object.entries(state.sections).forEach(([sec, items]) => {
    md += `## ${sec}\n`;
    items.forEach(item => {
      const key = sec + '::' + item;
      md += `- [${state.checked[key] ? 'x' : ' '}] ${item}\n`;
    });
    md += '\n';
  });
  if (notesArea.value) md += `## Notes\n${notesArea.value}\n`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([md], { type: 'text/markdown' }));
  a.download = `${document.getElementById('projName').textContent}-checklist.md`;
  a.click();
});

// Init
initState();
render();
</script>
</body>
</html>
