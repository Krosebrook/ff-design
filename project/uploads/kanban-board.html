    const COLUMNS = [
      { id: "backlog", label: "Backlog", color: "#64748B" },
      { id: "planned", label: "Planned", color: "#3B82F6" },
      { id: "doing", label: "In Progress", color: "#F59E0B" },
      { id: "done", label: "Done", color: "#22C55E" },
    ];

    const STATUS_MAP = { open: "backlog", backlog: "backlog", planned: "planned", doing: "doing", done: "done" };
    const TRACK_FILTERS = ["All", "Security", "AI Enablement", "Staff+", "Newsletter", "Personal OS", "Marketplace", "Recurring"];
    const PRIORITY_FILTERS = ["All", "P0", "P1", "P2", "P3"];
    const SOURCE_FILTERS = ["All", "WSJF Backlog", "Recurring OS"];

    // ─── Hidden Gems Generator ───
    function generateHiddenGems(task) {
      const gems = [];
      if (task.wsjf && task.wsjf >= 20 && task.size <= 1) {
        gems.push({ icon: "⚡", gem: "Quick Win Multiplier — High-impact, low-effort. Batch with 2-3 similar Size-1 tasks in a single peak window for compounding momentum." });
      }
      if (task.track === "Security" && task.rr >= 8) {
        gems.push({ icon: "🛡️", gem: "Portfolio Proof Point — High RR/OE security item. Document before/after as a CAR story for your Staff+ fortnightly update to Jackie." });
      }
      if (task.track === "Newsletter" && task.size <= 1) {
        gems.push({ icon: "📰", gem: "Thursday Batch Candidate — Per Bio-Cognitive Schedule, Thursdays are Stakeholder+Comms. Queue all Size-1 newsletter items into a single Thursday peak window." });
      }
      if (task.track === "AI Enablement") {
        gems.push({ icon: "🧠", gem: "Adoption Flywheel Fuel — Feeds your KPI framework metrics. Screenshot completion evidence for the pulse survey baseline and ROI methodology." });
      }
      if (task.notes && task.notes.toLowerCase().includes("block")) {
        gems.push({ icon: "🔗", gem: "Dependency Unlocker — Blocking downstream work. Completing it may cascade-unblock 2-3 other items, multiplying WSJF throughput for the week." });
      }
      if (task.track === "Staff+" && task.title.toLowerCase().includes("linkedin")) {
        gems.push({ icon: "🌐", gem: "Optionality Insurance — Update with specific metrics ($354K ROI, 50-200 eng scope). Recruiters index on quantified impact." });
      }
      if (task.recurrence === "Daily" || task.recurrence === "Weekly") {
        gems.push({ icon: "🔄", gem: "Habit Anchor Point — Attach to existing habit (after coffee, after standup) rather than scheduling cold. Completion rate jumps ~40%." });
      }
      if (task.wsjf && task.wsjf >= 25) {
        gems.push({ icon: "🔥", gem: "WSJF Critical Mass — Score ≥25 means every day of delay burns significant value. If not started in 48h, re-score TC." });
      }
      if (task.size >= 3 && task.wsjf && task.wsjf <= 7) {
        gems.push({ icon: "🪓", gem: "Decomposition Candidate — High effort + moderate WSJF. Split into 2-3 subtasks; the first likely scores much higher alone." });
      }
      if (task.track === "Marketplace") {
        gems.push({ icon: "💰", gem: "Revenue Pipeline Item — Feeds passive income stream. Track time-to-ship as a benchmark for pricing future Notion products." });
      }
      if (task.area === "Health") {
        gems.push({ icon: "🧬", gem: "Bio-Cognitive Enabler — Directly impacts peak window quality. Treat as infrastructure, not nice-to-have." });
      }
      if (task.track === "Personal OS" && task.title.toLowerCase().includes("chronotype")) {
        gems.push({ icon: "⏰", gem: "Meta-Optimization — This data lets you reschedule ALL other tasks to the right energy window. The task that makes every other task more efficient." });
      }
      const fallbacks = [
        { icon: "🎯", gem: "Definition of Done — Write one sentence: 'Done when ___.' Prevents scope creep and gives a clean archive entry." },
        { icon: "📸", gem: "Evidence Capture — Screenshot/save artifact on complete. Needed for monthly retro, Staff+ portfolio, or proof-of-work." },
        { icon: "🤖", gem: "Automation Candidate — After completing manually once, ask: 'Can Claude/n8n/Zapier do this next time?' Build automation while context is fresh." },
        { icon: "🔀", gem: "Cross-Track Synergy — Does completing this create material for another track? Security → newsletter content. Newsletter → Staff+ visibility." },
        { icon: "📊", gem: "Metric Connection — Link completion to a measurable KPI in your AI Adoption framework or Staff+ growth path. Untracked work = invisible work." },
      ];
      while (gems.length < 5) {
        const next = fallbacks.find(f => !gems.some(g => g.icon === f.icon));
        if (next) gems.push(next); else break;
      }
      return gems.slice(0, 5);
    }

    // ─── Styles (inline, no Tailwind dependency) ───
    const S = {
      badge: (bg, fg) => ({ fontSize: 11, fontWeight: 700, padding: "2px 6px", borderRadius: 4, background: bg, color: fg, display: "inline-block" }),
      filterBtn: (active) => ({ fontSize: 11, padding: "4px 8px", borderRadius: 4, border: "none", cursor: "pointer", background: active ? "#4f46e5" : "#1f2937", color: active ? "#fff" : "#9ca3af", transition: "all 0.15s" }),
      card: (selected) => ({ background: "#1f2937", border: `1px solid ${selected ? "#6366f1" : "#374151"}`, borderRadius: 8, padding: 12, marginBottom: 8, cursor: "pointer", position: "relative", transition: "all 0.15s", boxShadow: selected ? "0 0 0 1px rgba(99,102,241,0.3)" : "none" }),
      trackTag: (color) => ({ fontSize: 11, fontWeight: 500, padding: "2px 6px", borderRadius: 4, background: color + "22", color: color }),
      colWrap: { background: "#111827", borderRadius: 12, padding: 12, minHeight: 400, display: "flex", flexDirection: "column" },
      colHeader: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, padding: "0 4px" },
      dot: (color) => ({ width: 10, height: 10, borderRadius: "50%", background: color, display: "inline-block", marginRight: 8 }),
      moveBtn: { fontSize: 11, background: "#374151", color: "#d1d5db", border: "none", borderRadius: 4, padding: "2px 5px", cursor: "pointer", marginLeft: 2 },
      gemPanel: { background: "#0f172a", border: "1px solid rgba(99,102,241,0.3)", borderRadius: 12, padding: 20, marginBottom: 16 },
      gemItem: { display: "flex", gap: 12, alignItems: "flex-start", background: "rgba(31,41,55,0.5)", borderRadius: 8, padding: 12, border: "1px solid rgba(55,65,81,0.5)", marginBottom: 8 },
    };

    function PriorityBadge({ priority }) {
      const map = { P0: ["#dc2626","#fff"], P1: ["#f97316","#fff"], P2: ["#facc15","#111"], P3: ["#d1d5db","#374151"] };
      const [bg, fg] = map[priority] || map.P3;
      return <span style={S.badge(bg, fg)}>{priority}</span>;
    }

    function WsjfBadge({ score }) {
      if (!score) return null;
      const color = score >= 25 ? "#f87171" : score >= 20 ? "#fb923c" : score >= 10 ? "#facc15" : "#9ca3af";
      return <span style={{ fontSize: 11, fontFamily: "monospace", fontWeight: 700, color }}>WSJF {score}</span>;
    }

    function TaskCard({ task, onMove, onSelect, isSelected }) {
      const [hovered, setHovered] = React.useState(false);
      const overdue = task.due && new Date(task.due) < new Date("2026-03-21");
      return (
        <div
          style={S.card(isSelected)}
          onClick={() => onSelect(task.id)}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
        >
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 6 }}>
            <span style={S.trackTag(task.trackColor)}>{task.track}</span>
            <PriorityBadge priority={task.priority} />
          </div>
          <p style={{ fontSize: 13, fontWeight: 500, color: "#f3f4f6", lineHeight: 1.4, marginBottom: 6 }}>{task.title}</p>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <WsjfBadge score={task.wsjf} />
            {task.size && <span style={{ fontSize: 11, color: "#6b7280" }}>Size {task.size}</span>}
            {overdue && <span className="animate-pulse" style={{ fontSize: 11, color: "#f87171", fontWeight: 600 }}>OVERDUE</span>}
            {task.due && !overdue && <span style={{ fontSize: 11, color: "#6b7280" }}>Due {task.due}</span>}
            {task.recurrence && task.recurrence !== "None" && <span style={{ fontSize: 11, color: "#60a5fa" }}>{task.recurrence}</span>}
          </div>
          {task.notes && <p style={{ fontSize: 11, color: "#6b7280", marginTop: 6, lineHeight: 1.5 }}>{task.notes}</p>}
          {hovered && (
            <div style={{ position: "absolute", top: 4, right: 4, display: "flex", gap: 2 }}>
              {COLUMNS.map(col => {
                const cur = STATUS_MAP[task.status] || task.status;
                if (col.id === cur) return null;
                const arrows = { backlog: "◀◀", planned: "◀", doing: "▶", done: "▶▶" };
                return <button key={col.id} style={S.moveBtn} title={`Move to ${col.label}`} onClick={e => { e.stopPropagation(); onMove(task.id, col.id); }}>{arrows[col.id]}</button>;
              })}
            </div>
          )}
        </div>
      );
    }

    function HiddenGemsPanel({ task, onClose }) {
      const gems = useMemo(() => generateHiddenGems(task), [task]);
      return (
        <div style={S.gemPanel}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: "#a5b4fc" }}>Hidden Gems</h3>
              <p style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>5 non-obvious ways to leverage this task</p>
            </div>
            <button onClick={onClose} style={{ background: "none", border: "none", color: "#6b7280", fontSize: 18, cursor: "pointer" }}>✕</button>
          </div>
          <div style={{ fontSize: 13, fontWeight: 500, color: "#e5e7eb", padding: "8px 10px", background: "#1f2937", borderRadius: 6, borderLeft: `3px solid ${task.trackColor}`, marginBottom: 12 }}>
            {task.title}
          </div>
          {gems.map((g, i) => (
            <div key={i} style={S.gemItem}>
              <span style={{ fontSize: 18, flexShrink: 0, marginTop: 2 }}>{g.icon}</span>
              <p style={{ fontSize: 13, color: "#d1d5db", lineHeight: 1.5 }}>{g.gem}</p>
            </div>
          ))}
        </div>
      );
    }

    function KanbanBoard() {
      const [tasks, setTasks] = useState(INITIAL_TASKS);
      const [selectedTask, setSelectedTask] = useState(null);
      const [trackFilter, setTrackFilter] = useState("All");
      const [priorityFilter, setPriorityFilter] = useState("All");
      const [sourceFilter, setSourceFilter] = useState("All");
      const [sortBy, setSortBy] = useState("wsjf");
      const [showGems, setShowGems] = useState(null);

      const moveTask = useCallback((taskId, newStatus) => {
        setTasks(prev => prev.map(t => t.id === taskId ? { ...t, status: newStatus } : t));
      }, []);

      const filteredTasks = useMemo(() => {
        return tasks.filter(t => {
          if (trackFilter !== "All" && t.track !== trackFilter) return false;
          if (priorityFilter !== "All" && t.priority !== priorityFilter) return false;
          if (sourceFilter === "WSJF Backlog" && t.source !== "wsjf") return false;
          if (sourceFilter === "Recurring OS" && t.source !== "recurring") return false;
          return true;
        });
      }, [tasks, trackFilter, priorityFilter, sourceFilter]);

      const sortedInColumn = useCallback((colId) => {
        const colTasks = filteredTasks.filter(t => (STATUS_MAP[t.status] || t.status) === colId);
        return [...colTasks].sort((a, b) => {
          if (sortBy === "wsjf") return (b.wsjf || 0) - (a.wsjf || 0);
          if (sortBy === "priority") {
            const p = { P0: 0, P1: 1, P2: 2, P3: 3 };
            return (p[a.priority] ?? 9) - (p[b.priority] ?? 9);
          }
          if (sortBy === "size") return (a.size || 99) - (b.size || 99);
          return 0;
        });
      }, [filteredTasks, sortBy]);

      const stats = useMemo(() => {
        const total = tasks.length;
        const done = tasks.filter(t => (STATUS_MAP[t.status] || t.status) === "done").length;
        const overdue = tasks.filter(t => t.due && new Date(t.due) < new Date("2026-03-21") && (STATUS_MAP[t.status] || t.status) !== "done").length;
        const p0Open = tasks.filter(t => t.priority === "P0" && (STATUS_MAP[t.status] || t.status) !== "done").length;
        const avgWsjf = tasks.filter(t => t.wsjf).reduce((s, t) => s + t.wsjf, 0) / (tasks.filter(t => t.wsjf).length || 1);
        return { total, done, overdue, p0Open, avgWsjf: avgWsjf.toFixed(1) };
      }, [tasks]);

      const gemsTask = showGems ? tasks.find(t => t.id === showGems) : null;

      const FilterBar = ({ label, options, value, onChange }) => (
        <React.Fragment>
          <span style={{ fontSize: 11, color: "#6b7280", fontWeight: 500 }}>{label}:</span>
          {options.map(f => (
            <button key={f} style={S.filterBtn(value === f)} onClick={() => onChange(f)}>{f}</button>
          ))}
        </React.Fragment>
      );

      return (
        <div style={{ minHeight: "100vh", padding: 16 }}>
          {/* Header */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
              <h1 style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>Cross-Project Kanban</h1>
              <span style={{ fontSize: 11, background: "rgba(79,70,229,0.2)", color: "#a5b4fc", padding: "2px 8px", borderRadius: 10, fontWeight: 500 }}>WSJF + Recurring OS</span>
            </div>
            <p style={{ fontSize: 11, color: "#6b7280" }}>
              Last synced from Notion: 2026-03-21 · {stats.total} tasks · {stats.overdue} overdue · {stats.p0Open} P0 open · Avg WSJF: {stats.avgWsjf}
            </p>
          </div>

          {/* Filters */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16, alignItems: "center" }}>
            <FilterBar label="Track" options={TRACK_FILTERS} value={trackFilter} onChange={setTrackFilter} />
            <span style={{ color: "#374151", margin: "0 4px" }}>|</span>
            <FilterBar label="Priority" options={PRIORITY_FILTERS} value={priorityFilter} onChange={setPriorityFilter} />
            <span style={{ color: "#374151", margin: "0 4px" }}>|</span>
            <FilterBar label="Source" options={SOURCE_FILTERS} value={sourceFilter} onChange={setSourceFilter} />
            <span style={{ color: "#374151", margin: "0 4px" }}>|</span>
            <span style={{ fontSize: 11, color: "#6b7280", fontWeight: 500 }}>Sort:</span>
            {["wsjf", "priority", "size"].map(s => (
              <button key={s} style={S.filterBtn(sortBy === s)} onClick={() => setSortBy(s)}>
                {s === "wsjf" ? "WSJF ↓" : s === "priority" ? "Priority" : "Size ↑"}
              </button>
            ))}
          </div>

          {/* Gems Panel */}
          {gemsTask && <HiddenGemsPanel task={gemsTask} onClose={() => setShowGems(null)} />}

          {/* Kanban */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
            {COLUMNS.map(col => {
              const colTasks = sortedInColumn(col.id);
              return (
                <div key={col.id} style={S.colWrap}>
                  <div style={S.colHeader}>
                    <div style={{ display: "flex", alignItems: "center" }}>
                      <span style={S.dot(col.color)} />
                      <span style={{ fontSize: 13, fontWeight: 600, color: "#d1d5db" }}>{col.label}</span>
                    </div>
                    <span style={{ fontSize: 11, color: "#4b5563", background: "#1f2937", padding: "2px 6px", borderRadius: 4 }}>{colTasks.length}</span>
                  </div>
                  <div className="col-scroll" style={{ flex: 1 }}>
                    {colTasks.map(task => (
                      <TaskCard
                        key={task.id}
                        task={task}
                        onMove={moveTask}
                        isSelected={selectedTask === task.id}
                        onSelect={(id) => {
                          setSelectedTask(id === selectedTask ? null : id);
                          setShowGems(id === showGems ? null : id);
                        }}
                      />
                    ))}
                    {colTasks.length === 0 && (
                      <div style={{ textAlign: "center", padding: "32px 0", color: "#374151", fontSize: 12 }}>No tasks</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Footer */}
          <div style={{ marginTop: 16, textAlign: "center" }}>
            <p style={{ fontSize: 11, color: "#4b5563" }}>Click any card to reveal 5 Hidden Gems · Hover to move between columns · WSJF = (BV + TC + RR/OE) / Size</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<KanbanBoard />);
  </script>
</body>
</html>
